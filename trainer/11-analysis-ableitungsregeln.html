<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ableitungsregeln - DifferenzierungsEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="../spirale.css">
    <style>:root { --spirale-primary: #667eea; --spirale-secondary: #764ba2; }</style>
</head>
<body>
    <div class="spirale-container" id="app"></div>
    <script>
    const THEMA_KEY = '11-analysis-ableitungsregeln';
    const THEMA_CONFIG = { name: 'Ableitungsregeln', bereich: 'analysis', p3Enabled: true };
    const AUFGABEN = [

    // ══════════════════════════════════════════════════════════════
    // LEVEL 1 — Potenzregel für einfache Monome
    // ══════════════════════════════════════════════════════════════
    {
        id: 1, level: 1, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^3\\). Berechne \\(f'(2)\\).",
        loesung: 12, toleranz: 0,
        tipp: "Die Potenzregel lautet: \\((x^n)' = n \\cdot x^{n-1}\\).",
        loesungsweg: "\\(f'(x) = 3x^2\\). Einsetzen: \\(f'(2) = 3 \\cdot 2^2 = 3 \\cdot 4 = 12\\)."
    },
    {
        id: 2, level: 1, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^5\\). Berechne \\(f'(1)\\).",
        loesung: 5, toleranz: 0,
        tipp: "Wende die Potenzregel an: Exponent nach vorne, Exponent minus 1.",
        loesungsweg: "\\(f'(x) = 5x^4\\). Einsetzen: \\(f'(1) = 5 \\cdot 1^4 = 5\\)."
    },
    {
        id: 3, level: 1, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^4\\). Berechne \\(f'(3)\\).",
        loesung: 108, toleranz: 0,
        tipp: "Potenzregel: \\(f'(x) = 4x^3\\). Dann \\(x = 3\\) einsetzen.",
        loesungsweg: "\\(f'(x) = 4x^3\\). Einsetzen: \\(f'(3) = 4 \\cdot 3^3 = 4 \\cdot 27 = 108\\)."
    },
    {
        id: 4, level: 1, typ: "mc",
        frage: "Wie lautet die Ableitung von \\(f(x) = x^6\\)?",
        optionen: ["\\(f'(x) = 6x^5\\)", "\\(f'(x) = 5x^6\\)", "\\(f'(x) = 6x^7\\)", "\\(f'(x) = x^5\\)"],
        korrekt: 0,
        tipp: "Die Potenzregel lautet: \\((x^n)' = n \\cdot x^{n-1}\\).",
        loesungsweg: "Nach der Potenzregel: \\(f'(x) = 6 \\cdot x^{6-1} = 6x^5\\)."
    },
    {
        id: 5, level: 1, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^2\\). Berechne \\(f'(5)\\).",
        loesung: 10, toleranz: 0,
        tipp: "\\(f'(x) = 2x\\). Setze \\(x = 5\\) ein.",
        loesungsweg: "\\(f'(x) = 2x\\). Einsetzen: \\(f'(5) = 2 \\cdot 5 = 10\\)."
    },
    {
        id: 6, level: 1, typ: "mc",
        frage: "Was ist die Ableitung der konstanten Funktion \\(f(x) = 7\\)?",
        optionen: ["\\(f'(x) = 7\\)", "\\(f'(x) = 1\\)", "\\(f'(x) = 0\\)", "\\(f'(x) = 7x\\)"],
        korrekt: 2,
        tipp: "Die Ableitung einer Konstanten ist immer gleich. Denke an die Steigung einer horizontalen Geraden.",
        loesungsweg: "Konstante Funktionen haben die Steigung 0, also \\(f'(x) = 0\\)."
    },

    // ══════════════════════════════════════════════════════════════
    // LEVEL 2 — Summenregel + Faktorregel
    // ══════════════════════════════════════════════════════════════
    {
        id: 7, level: 2, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = 3x^2 - 4x + 1\\). Berechne \\(f'(2)\\).",
        loesung: 8, toleranz: 0,
        tipp: "Leite jeden Summanden einzeln ab: Faktorregel + Potenzregel.",
        loesungsweg: "\\(f'(x) = 6x - 4\\). Einsetzen: \\(f'(2) = 6 \\cdot 2 - 4 = 12 - 4 = 8\\)."
    },
    {
        id: 8, level: 2, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = 5x^3 + 2x\\). Berechne \\(f'(1)\\).",
        loesung: 17, toleranz: 0,
        tipp: "Faktor- und Summenregel: Leite jeden Summanden einzeln ab.",
        loesungsweg: "\\(f'(x) = 15x^2 + 2\\). Einsetzen: \\(f'(1) = 15 \\cdot 1 + 2 = 17\\)."
    },
    {
        id: 9, level: 2, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = -2x^3 + 6x^2 - x\\). Berechne \\(f'(0)\\).",
        loesung: -1, toleranz: 0,
        tipp: "Leite ab, dann setze \\(x = 0\\) ein. Viele Terme fallen weg!",
        loesungsweg: "\\(f'(x) = -6x^2 + 12x - 1\\). Einsetzen: \\(f'(0) = 0 + 0 - 1 = -1\\)."
    },
    {
        id: 10, level: 2, typ: "mc",
        frage: "Wie lautet die Ableitung von \\(f(x) = 4x^3 - 6x^2 + 2x - 5\\)?",
        optionen: [
            "\\(f'(x) = 12x^2 - 12x + 2\\)",
            "\\(f'(x) = 12x^2 - 6x + 2\\)",
            "\\(f'(x) = 4x^2 - 6x + 2\\)",
            "\\(f'(x) = 12x^2 - 12x + 2 - 5\\)"
        ],
        korrekt: 0,
        tipp: "Leite jeden Summanden einzeln ab. Die Konstante -5 fällt weg.",
        loesungsweg: "\\(f'(x) = 4 \\cdot 3x^2 - 6 \\cdot 2x + 2 \\cdot 1 - 0 = 12x^2 - 12x + 2\\)."
    },
    {
        id: 11, level: 2, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = \\frac{1}{2}x^4 - 3x + 7\\). Berechne \\(f'(2)\\).",
        loesung: 13, toleranz: 0,
        tipp: "\\(\\frac{1}{2}x^4\\) ableiten: Faktor \\(\\frac{1}{2}\\) bleibt, Potenzregel anwenden.",
        loesungsweg: "\\(f'(x) = 2x^3 - 3\\). Einsetzen: \\(f'(2) = 2 \\cdot 8 - 3 = 16 - 3 = 13\\)."
    },
    {
        id: 12, level: 2, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = -x^2 + 8x - 3\\). Berechne \\(f'(4)\\).",
        loesung: 0, toleranz: 0,
        tipp: "Leite ab und setze ein. Was bedeutet \\(f'(4) = 0\\) geometrisch?",
        loesungsweg: "\\(f'(x) = -2x + 8\\). Einsetzen: \\(f'(4) = -2 \\cdot 4 + 8 = -8 + 8 = 0\\). (Extremstelle!)"
    },

    // ══════════════════════════════════════════════════════════════
    // LEVEL 3 — Polynome mit negativen Exponenten, gemischt
    // ══════════════════════════════════════════════════════════════
    {
        id: 13, level: 3, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^3 - 3x^2 + 3x - 1\\). Berechne \\(f'(1)\\).",
        loesung: 0, toleranz: 0,
        tipp: "Leite ab und setze \\(x = 1\\) ein.",
        loesungsweg: "\\(f'(x) = 3x^2 - 6x + 3\\). Einsetzen: \\(f'(1) = 3 - 6 + 3 = 0\\)."
    },
    {
        id: 14, level: 3, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^{-1} = \\frac{1}{x}\\). Berechne \\(f'(2)\\).",
        loesung: -0.25, toleranz: 0.01,
        tipp: "Schreibe \\(\\frac{1}{x}\\) als \\(x^{-1}\\) und wende die Potenzregel an.",
        loesungsweg: "\\(f'(x) = -1 \\cdot x^{-2} = -\\frac{1}{x^2}\\). Einsetzen: \\(f'(2) = -\\frac{1}{4} = -0{,}25\\)."
    },
    {
        id: 15, level: 3, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = 2x^3 + \\frac{3}{x}\\). Berechne \\(f'(1)\\).",
        loesung: 3, toleranz: 0,
        tipp: "Schreibe \\(\\frac{3}{x}\\) als \\(3x^{-1}\\), dann Potenzregel.",
        loesungsweg: "\\(f(x) = 2x^3 + 3x^{-1}\\). \\(f'(x) = 6x^2 - 3x^{-2}\\). Einsetzen: \\(f'(1) = 6 - 3 = 3\\)."
    },
    {
        id: 16, level: 3, typ: "mc",
        frage: "Wie lautet die Ableitung von \\(f(x) = \\frac{4}{x^2}\\)?",
        optionen: [
            "\\(f'(x) = -\\frac{8}{x^3}\\)",
            "\\(f'(x) = \\frac{8}{x^3}\\)",
            "\\(f'(x) = -\\frac{4}{x^3}\\)",
            "\\(f'(x) = \\frac{4}{x}\\)"
        ],
        korrekt: 0,
        tipp: "Schreibe \\(\\frac{4}{x^2} = 4x^{-2}\\) und wende die Potenzregel an.",
        loesungsweg: "\\(f(x) = 4x^{-2}\\). \\(f'(x) = 4 \\cdot (-2) \\cdot x^{-3} = -8x^{-3} = -\\frac{8}{x^3}\\)."
    },
    {
        id: 17, level: 3, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^4 - 4x^3 + 6x^2\\). Berechne \\(f'(-1)\\).",
        loesung: -28, toleranz: 0,
        tipp: "Leite ab: \\(f'(x) = 4x^3 - 12x^2 + 12x\\). Dann \\(x = -1\\) einsetzen.",
        loesungsweg: "\\(f'(x) = 4x^3 - 12x^2 + 12x\\). Einsetzen: \\(f'(-1) = 4 \\cdot (-1) - 12 \\cdot 1 + 12 \\cdot (-1) = -4 - 12 - 12 = -28\\)."
    },
    {
        id: 18, level: 3, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = \\frac{1}{3}x^3 - \\frac{1}{2}x^2 + x\\). Berechne \\(f'(3)\\).",
        loesung: 7, toleranz: 0,
        tipp: "Leite jeden Term einzeln ab: \\(\\frac{1}{3} \\cdot 3x^2 = x^2\\) usw.",
        loesungsweg: "\\(f'(x) = x^2 - x + 1\\). Einsetzen: \\(f'(3) = 9 - 3 + 1 = 7\\)."
    },

    // ══════════════════════════════════════════════════════════════
    // LEVEL 4 — Produktregel, e^x, sin, cos
    // ══════════════════════════════════════════════════════════════
    {
        id: 19, level: 4, typ: "mc",
        frage: "Wie lautet die Ableitung von \\(f(x) = e^x\\)?",
        optionen: [
            "\\(f'(x) = e^x\\)",
            "\\(f'(x) = x \\cdot e^{x-1}\\)",
            "\\(f'(x) = \\frac{e^x}{x}\\)",
            "\\(f'(x) = e^{x+1}\\)"
        ],
        korrekt: 0,
        tipp: "Die Exponentialfunktion ist die einzige Funktion, die ihre eigene Ableitung ist.",
        loesungsweg: "\\((e^x)' = e^x\\). Die natürliche Exponentialfunktion ist ihre eigene Ableitung."
    },
    {
        id: 20, level: 4, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^2 \\cdot e^x\\). Berechne \\(f'(0)\\). <br><em>Hinweis: Produktregel verwenden!</em>",
        loesung: 0, toleranz: 0,
        tipp: "Produktregel: \\((u \\cdot v)' = u' \\cdot v + u \\cdot v'\\) mit \\(u = x^2\\) und \\(v = e^x\\).",
        loesungsweg: "\\(f'(x) = 2x \\cdot e^x + x^2 \\cdot e^x = e^x(2x + x^2)\\). Einsetzen: \\(f'(0) = e^0 \\cdot (0 + 0) = 1 \\cdot 0 = 0\\)."
    },
    {
        id: 21, level: 4, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = 3e^x + 2x^2\\). Berechne \\(f'(0)\\).",
        loesung: 3, toleranz: 0,
        tipp: "\\((e^x)' = e^x\\) und \\((x^2)' = 2x\\). Summenregel anwenden.",
        loesungsweg: "\\(f'(x) = 3e^x + 4x\\). Einsetzen: \\(f'(0) = 3 \\cdot e^0 + 4 \\cdot 0 = 3 \\cdot 1 = 3\\)."
    },
    {
        id: 22, level: 4, typ: "mc",
        frage: "Wie lautet die Ableitung von \\(f(x) = \\sin(x)\\)?",
        optionen: [
            "\\(f'(x) = \\cos(x)\\)",
            "\\(f'(x) = -\\cos(x)\\)",
            "\\(f'(x) = -\\sin(x)\\)",
            "\\(f'(x) = \\sin(x)\\)"
        ],
        korrekt: 0,
        tipp: "Merke dir die Ableitungskette: \\(\\sin \\to \\cos \\to -\\sin \\to -\\cos \\to \\sin\\).",
        loesungsweg: "\\((\\sin(x))' = \\cos(x)\\)."
    },
    {
        id: 23, level: 4, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x \\cdot \\sin(x)\\). Berechne \\(f'(0)\\). <br><em>Hinweis: Produktregel!</em>",
        loesung: 0, toleranz: 0,
        tipp: "Produktregel mit \\(u = x\\), \\(v = \\sin(x)\\): \\(f'(x) = 1 \\cdot \\sin(x) + x \\cdot \\cos(x)\\).",
        loesungsweg: "\\(f'(x) = \\sin(x) + x\\cos(x)\\). Einsetzen: \\(f'(0) = \\sin(0) + 0 \\cdot \\cos(0) = 0 + 0 = 0\\)."
    },
    {
        id: 24, level: 4, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^2 \\cdot e^x\\). Berechne \\(f'(1)\\). <br>Runde auf zwei Dezimalstellen.",
        loesung: 8.15, toleranz: 0.01,
        tipp: "Produktregel: \\(f'(x) = 2x \\cdot e^x + x^2 \\cdot e^x = e^x(2x + x^2)\\).",
        loesungsweg: "\\(f'(x) = e^x(x^2 + 2x)\\). Einsetzen: \\(f'(1) = e^1(1 + 2) = 3e \\approx 3 \\cdot 2{,}718 = 8{,}15\\)."
    },

    // ══════════════════════════════════════════════════════════════
    // LEVEL 5 — Komplexe Kombinationen, mehrere Regeln
    // ══════════════════════════════════════════════════════════════
    {
        id: 25, level: 5, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = (2x+1) \\cdot x^3\\). Berechne \\(f'(1)\\). <br><em>Produktregel oder erst ausmultiplizieren!</em>",
        loesung: 11, toleranz: 0,
        tipp: "Ausmultipliziert: \\(f(x) = 2x^4 + x^3\\). Oder: Produktregel mit \\(u = 2x+1\\), \\(v = x^3\\).",
        loesungsweg: "\\(f(x) = 2x^4 + x^3\\), also \\(f'(x) = 8x^3 + 3x^2\\). Einsetzen: \\(f'(1) = 8 + 3 = 11\\)."
    },
    {
        id: 26, level: 5, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^2 \\cdot \\cos(x)\\). Berechne \\(f'(0)\\).",
        loesung: 0, toleranz: 0,
        tipp: "Produktregel: \\(u = x^2\\), \\(v = \\cos(x)\\). Beachte: \\((\\cos(x))' = -\\sin(x)\\).",
        loesungsweg: "\\(f'(x) = 2x \\cdot \\cos(x) + x^2 \\cdot (-\\sin(x)) = 2x\\cos(x) - x^2\\sin(x)\\). Einsetzen: \\(f'(0) = 0 \\cdot 1 - 0 \\cdot 0 = 0\\)."
    },
    {
        id: 27, level: 5, typ: "mc",
        frage: "Wie lautet die Ableitung von \\(f(x) = x \\cdot e^x - 3x^2\\)?",
        optionen: [
            "\\(f'(x) = e^x + xe^x - 6x\\)",
            "\\(f'(x) = xe^x - 6x\\)",
            "\\(f'(x) = e^x + xe^x - 3x\\)",
            "\\(f'(x) = e^x - 6x\\)"
        ],
        korrekt: 0,
        tipp: "Produktregel für \\(x \\cdot e^x\\): \\((x \\cdot e^x)' = 1 \\cdot e^x + x \\cdot e^x\\). Dann \\(-3x^2\\) ableiten.",
        loesungsweg: "\\((x \\cdot e^x)' = e^x + xe^x\\) (Produktregel). \\((-3x^2)' = -6x\\). Zusammen: \\(f'(x) = e^x + xe^x - 6x\\)."
    },
    {
        id: 28, level: 5, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = 2\\sin(x) + 3\\cos(x)\\). Berechne \\(f'(0)\\).",
        loesung: 2, toleranz: 0,
        tipp: "\\((\\sin(x))' = \\cos(x)\\) und \\((\\cos(x))' = -\\sin(x)\\).",
        loesungsweg: "\\(f'(x) = 2\\cos(x) - 3\\sin(x)\\). Einsetzen: \\(f'(0) = 2 \\cdot 1 - 3 \\cdot 0 = 2\\)."
    },
    {
        id: 29, level: 5, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x^3 - 6x^2 + 9x + 1\\). Für welchen größeren \\(x\\)-Wert gilt \\(f'(x) = 0\\)?",
        loesung: 3, toleranz: 0,
        tipp: "Setze \\(f'(x) = 0\\) und löse die quadratische Gleichung. Es gibt zwei Nullstellen.",
        loesungsweg: "\\(f'(x) = 3x^2 - 12x + 9 = 3(x^2 - 4x + 3) = 3(x-1)(x-3)\\). Nullstellen: \\(x = 1\\) und \\(x = 3\\). Der größere Wert ist \\(x = 3\\)."
    },
    {
        id: 30, level: 5, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = e^x + x^2 - 4x\\). Berechne \\(f'(0)\\).",
        loesung: -3, toleranz: 0,
        tipp: "Summenregel: Leite jeden Term einzeln ab.",
        loesungsweg: "\\(f'(x) = e^x + 2x - 4\\). Einsetzen: \\(f'(0) = 1 + 0 - 4 = -3\\)."
    },

    // ══════════════════════════════════════════════════════════════
    // LEVEL 6 — Produktregel mit Trig/Exp, Mehrschritt-Aufgaben
    // ══════════════════════════════════════════════════════════════
    {
        id: 31, level: 6, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = e^x \\cdot \\sin(x)\\). Berechne \\(f'(0)\\).",
        loesung: 1, toleranz: 0,
        tipp: "Produktregel: \\(u = e^x\\), \\(v = \\sin(x)\\). Also \\(f'(x) = e^x\\sin(x) + e^x\\cos(x)\\).",
        loesungsweg: "\\(f'(x) = e^x\\sin(x) + e^x\\cos(x) = e^x(\\sin(x) + \\cos(x))\\). Einsetzen: \\(f'(0) = e^0(\\sin(0) + \\cos(0)) = 1 \\cdot (0 + 1) = 1\\)."
    },
    {
        id: 32, level: 6, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = e^x \\cdot \\cos(x)\\). Berechne \\(f'(0)\\).",
        loesung: 1, toleranz: 0,
        tipp: "Produktregel: \\(f'(x) = e^x\\cos(x) + e^x \\cdot (-\\sin(x))\\).",
        loesungsweg: "\\(f'(x) = e^x\\cos(x) - e^x\\sin(x) = e^x(\\cos(x) - \\sin(x))\\). Einsetzen: \\(f'(0) = e^0(\\cos(0) - \\sin(0)) = 1 \\cdot (1 - 0) = 1\\)."
    },
    {
        id: 33, level: 6, typ: "mc",
        frage: "Gegeben ist \\(f(x) = x^2 \\cdot e^x\\). Welche Aussage über \\(f'(x)\\) ist korrekt?",
        optionen: [
            "\\(f'(x) = e^x(x^2 + 2x)\\)",
            "\\(f'(x) = 2x \\cdot e^x\\)",
            "\\(f'(x) = e^x(x^2 - 2x)\\)",
            "\\(f'(x) = x^2 \\cdot e^x + 2x\\)"
        ],
        korrekt: 0,
        tipp: "Produktregel: \\(u = x^2\\), \\(v = e^x\\). \\(f'(x) = 2x \\cdot e^x + x^2 \\cdot e^x\\). Klammere \\(e^x\\) aus.",
        loesungsweg: "\\(f'(x) = 2x \\cdot e^x + x^2 \\cdot e^x = e^x(2x + x^2) = e^x(x^2 + 2x)\\)."
    },
    {
        id: 34, level: 6, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = (x^2 + 1) \\cdot \\sin(x)\\). Berechne \\(f'\\left(\\frac{\\pi}{2}\\right)\\). <br>Runde auf zwei Dezimalstellen.",
        loesung: 3.14, toleranz: 0.02,
        tipp: "Produktregel: \\(f'(x) = 2x\\sin(x) + (x^2+1)\\cos(x)\\). Beachte: \\(\\sin(\\pi/2) = 1\\), \\(\\cos(\\pi/2) = 0\\).",
        loesungsweg: "\\(f'(x) = 2x\\sin(x) + (x^2+1)\\cos(x)\\). Bei \\(x = \\frac{\\pi}{2}\\): \\(f' = 2 \\cdot \\frac{\\pi}{2} \\cdot 1 + (\\frac{\\pi^2}{4}+1) \\cdot 0 = \\pi \\approx 3{,}14\\)."
    },
    {
        id: 35, level: 6, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = (3x - 1) \\cdot e^x\\). Berechne \\(f'(0)\\).",
        loesung: 2, toleranz: 0,
        tipp: "Produktregel: \\(u = 3x - 1\\), \\(v = e^x\\). Also \\(f'(x) = 3e^x + (3x-1)e^x\\).",
        loesungsweg: "\\(f'(x) = 3 \\cdot e^x + (3x-1) \\cdot e^x = e^x(3 + 3x - 1) = e^x(3x + 2)\\). Einsetzen: \\(f'(0) = 1 \\cdot 2 = 2\\)."
    },
    {
        id: 36, level: 6, typ: "numerisch",
        frage: "Gegeben ist \\(f(x) = x \\cdot e^x + \\sin(x) - x^3\\). Berechne \\(f'(0)\\).",
        loesung: 2, toleranz: 0,
        tipp: "Leite jeden Term einzeln ab. \\((x \\cdot e^x)' = e^x + xe^x\\) (Produktregel).",
        loesungsweg: "\\(f'(x) = e^x + xe^x + \\cos(x) - 3x^2\\). Einsetzen: \\(f'(0) = 1 + 0 + 1 - 0 = 2\\)."
    }

    ];
    </script>
    <script src="../p3-reflexion.js"></script>
    <script src="../spirale-engine.js"></script>
</body>
</html>
