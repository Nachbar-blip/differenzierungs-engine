<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potenzfunktionen (ganzz. Exp.) - DifferenzierungsEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

</head>
<body>
    <div class="spirale-container" id="app"></div>
    <script>
    const THEMA_KEY = '9-pot-ganzzahlige-exp';
    const THEMA_CONFIG = { name: 'Potenzfunktionen (ganzz. Exp.)', bereich: 'analysis' };
    const AUFGABEN = [

    // ═══════════════════════════════════════════════════════════════
    // Level 1: Negative Exponenten umschreiben
    // ═══════════════════════════════════════════════════════════════

    {
        id: 1, level: 1, typ: "mc",
        frage: "Welcher Term ist gleich \\(x^{-2}\\)?",
        optionen: ["\\(-x^2\\)", "\\(\\frac{1}{x^2}\\)", "\\(\\frac{1}{2x}\\)", "\\(-\\frac{1}{x^2}\\)"],
        korrekt: 1,
        tipp: "Definition: \\(x^{-n} = \\frac{1}{x^n}\\) für \\(x \\neq 0\\).",
        loesungsweg: "\\(x^{-2} = \\frac{1}{x^2}\\). Ein negativer Exponent bedeutet Kehrwert, nicht Vorzeichenwechsel."
    },
    {
        id: 2, level: 1, typ: "mc",
        frage: "Schreibe \\(x^{-3}\\) als Bruch.",
        optionen: ["\\(\\frac{1}{x^3}\\)", "\\(\\frac{3}{x}\\)", "\\(-x^3\\)", "\\(\\frac{1}{3x}\\)"],
        korrekt: 0,
        tipp: "Regel: \\(x^{-n} = \\frac{1}{x^n}\\).",
        loesungsweg: "\\(x^{-3} = \\frac{1}{x^3}\\)."
    },
    {
        id: 3, level: 1, typ: "mc",
        frage: "Welcher Term entspricht \\(\\frac{1}{x^4}\\)?",
        optionen: ["\\(x^4\\)", "\\(x^{1/4}\\)", "\\(x^{-4}\\)", "\\(-x^4\\)"],
        korrekt: 2,
        tipp: "Umkehrung von \\(x^{-n} = \\frac{1}{x^n}\\).",
        loesungsweg: "\\(\\frac{1}{x^4} = x^{-4}\\)."
    },
    {
        id: 4, level: 1, typ: "mc",
        frage: "Wie lautet \\(2x^{-1}\\) als Bruch?",
        optionen: ["\\(\\frac{1}{2x}\\)", "\\(\\frac{2}{x}\\)", "\\(-2x\\)", "\\(\\frac{x}{2}\\)"],
        korrekt: 1,
        tipp: "Nur das \\(x\\) bekommt den Kehrwert, der Faktor 2 bleibt oben.",
        loesungsweg: "\\(2x^{-1} = 2 \\cdot \\frac{1}{x} = \\frac{2}{x}\\)."
    },
    {
        id: 5, level: 1, typ: "mc",
        frage: "Welcher Ausdruck ist gleich \\(\\frac{5}{x^2}\\)?",
        optionen: ["\\(5x^2\\)", "\\(5x^{-2}\\)", "\\(\\frac{1}{5x^2}\\)", "\\((5x)^{-2}\\)"],
        korrekt: 1,
        tipp: "Der Faktor 5 steht vor der Potenz mit negativem Exponenten.",
        loesungsweg: "\\(\\frac{5}{x^2} = 5 \\cdot \\frac{1}{x^2} = 5 \\cdot x^{-2} = 5x^{-2}\\)."
    },
    {
        id: 6, level: 1, typ: "mc",
        frage: "Welche Umformung ist korrekt?",
        optionen: [
            "\\(x^{-5} = -x^5\\)",
            "\\(x^{-5} = \\frac{1}{x^5}\\)",
            "\\(x^{-5} = \\frac{1}{x^{-5}}\\)",
            "\\(x^{-5} = x^5\\)"
        ],
        korrekt: 1,
        tipp: "Ein negativer Exponent bildet den Kehrwert.",
        loesungsweg: "Nach der Definition gilt \\(x^{-n} = \\frac{1}{x^n}\\), also \\(x^{-5} = \\frac{1}{x^5}\\)."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 2: Funktionswerte berechnen
    // ═══════════════════════════════════════════════════════════════

    {
        id: 7, level: 2, typ: "numerisch",
        frage: "Berechne \\(f(2)\\) für \\(f(x) = \\frac{1}{x^2}\\).",
        loesung: 0.25,
        toleranz: 0.001,
        tipp: "Setze \\(x = 2\\) ein: \\(\\frac{1}{2^2}\\).",
        loesungsweg: "\\(f(2) = \\frac{1}{2^2} = \\frac{1}{4} = 0{,}25\\)."
    },
    {
        id: 8, level: 2, typ: "numerisch",
        frage: "Berechne \\(f(-2)\\) für \\(f(x) = \\frac{1}{x^3}\\).",
        loesung: -0.125,
        toleranz: 0.001,
        tipp: "\\((-2)^3 = -8\\). Danach Kehrwert bilden.",
        loesungsweg: "\\(f(-2) = \\frac{1}{(-2)^3} = \\frac{1}{-8} = -0{,}125\\)."
    },
    {
        id: 9, level: 2, typ: "numerisch",
        frage: "Berechne \\(f(4)\\) für \\(f(x) = x^{-1}\\).",
        loesung: 0.25,
        toleranz: 0.001,
        tipp: "\\(x^{-1} = \\frac{1}{x}\\).",
        loesungsweg: "\\(f(4) = 4^{-1} = \\frac{1}{4} = 0{,}25\\)."
    },
    {
        id: 10, level: 2, typ: "numerisch",
        frage: "Berechne \\(f(5)\\) für \\(f(x) = \\frac{1}{x^2}\\). (Runde auf 2 Nachkommastellen.)",
        loesung: 0.04,
        toleranz: 0.005,
        tipp: "\\(5^2 = 25\\), dann Kehrwert.",
        loesungsweg: "\\(f(5) = \\frac{1}{5^2} = \\frac{1}{25} = 0{,}04\\)."
    },
    {
        id: 11, level: 2, typ: "numerisch",
        frage: "Berechne \\(f(0{,}5)\\) für \\(f(x) = \\frac{1}{x^2}\\).",
        loesung: 4,
        toleranz: 0.01,
        tipp: "\\((0{,}5)^2 = 0{,}25\\). Kehrwert von \\(0{,}25\\) ist …?",
        loesungsweg: "\\(f(0{,}5) = \\frac{1}{(0{,}5)^2} = \\frac{1}{0{,}25} = 4\\)."
    },
    {
        id: 12, level: 2, typ: "numerisch",
        frage: "Berechne \\(f(-1)\\) für \\(f(x) = \\frac{1}{x^4}\\).",
        loesung: 1,
        toleranz: 0,
        tipp: "\\((-1)^4 = 1\\), weil der Exponent gerade ist.",
        loesungsweg: "\\(f(-1) = \\frac{1}{(-1)^4} = \\frac{1}{1} = 1\\)."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 3: Termvereinfachung mit mehreren Potenzgesetzen
    // ═══════════════════════════════════════════════════════════════

    {
        id: 13, level: 3, typ: "mc",
        frage: "Vereinfache: \\(x^3 \\cdot x^{-5}\\).",
        optionen: ["\\(x^{-2}\\)", "\\(x^{-15}\\)", "\\(x^{8}\\)", "\\(x^{2}\\)"],
        korrekt: 0,
        tipp: "Gleiche Basis: Exponenten addieren.",
        loesungsweg: "\\(x^3 \\cdot x^{-5} = x^{3+(-5)} = x^{-2}\\)."
    },
    {
        id: 14, level: 3, typ: "mc",
        frage: "Vereinfache: \\(\\frac{x^4}{x^{-2}}\\).",
        optionen: ["\\(x^2\\)", "\\(x^{-8}\\)", "\\(x^6\\)", "\\(x^{-2}\\)"],
        korrekt: 2,
        tipp: "Division: Exponenten subtrahieren. \\(x^a : x^b = x^{a-b}\\).",
        loesungsweg: "\\(\\frac{x^4}{x^{-2}} = x^{4-(-2)} = x^{4+2} = x^6\\)."
    },
    {
        id: 15, level: 3, typ: "mc",
        frage: "Vereinfache: \\((x^{-3})^2\\).",
        optionen: ["\\(x^{-1}\\)", "\\(x^{-6}\\)", "\\(x^{6}\\)", "\\(x^{-5}\\)"],
        korrekt: 1,
        tipp: "Potenz einer Potenz: Exponenten multiplizieren.",
        loesungsweg: "\\((x^{-3})^2 = x^{-3 \\cdot 2} = x^{-6}\\)."
    },
    {
        id: 16, level: 3, typ: "mc",
        frage: "Vereinfache: \\(\\frac{a^5 \\cdot a^{-2}}{a^4}\\).",
        optionen: ["\\(a^{-1}\\)", "\\(a^{3}\\)", "\\(a^{7}\\)", "\\(a^{-3}\\)"],
        korrekt: 0,
        tipp: "Zähler erst zusammenfassen, dann dividieren.",
        loesungsweg: "Zähler: \\(a^5 \\cdot a^{-2} = a^{3}\\). Dann: \\(\\frac{a^3}{a^4} = a^{3-4} = a^{-1}\\)."
    },
    {
        id: 17, level: 3, typ: "mc",
        frage: "Vereinfache: \\((2x^{-1})^3\\).",
        optionen: ["\\(6x^{-3}\\)", "\\(8x^{-3}\\)", "\\(2x^{-3}\\)", "\\(8x^{3}\\)"],
        korrekt: 1,
        tipp: "\\((a \\cdot b)^n = a^n \\cdot b^n\\). Beide Faktoren werden potenziert.",
        loesungsweg: "\\((2x^{-1})^3 = 2^3 \\cdot (x^{-1})^3 = 8 \\cdot x^{-3} = 8x^{-3}\\)."
    },
    {
        id: 18, level: 3, typ: "mc",
        frage: "Welcher Ausdruck ist gleich \\(x^{-2} \\cdot x^{-3}\\)?",
        optionen: [
            "\\(\\frac{1}{x^5}\\)",
            "\\(\\frac{1}{x^6}\\)",
            "\\(x^{5}\\)",
            "\\(\\frac{1}{x^{-5}}\\)"
        ],
        korrekt: 0,
        tipp: "Erst Exponenten addieren, dann in Bruchschreibweise umformen.",
        loesungsweg: "\\(x^{-2} \\cdot x^{-3} = x^{-5} = \\frac{1}{x^5}\\)."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 4: Zehnerpotenzen, wissenschaftliche Notation, Anwendung
    // ═══════════════════════════════════════════════════════════════

    {
        id: 19, level: 4, typ: "mc",
        frage: "Schreibe \\(0{,}000 \\, 01\\) als Zehnerpotenz.",
        optionen: ["\\(10^{-4}\\)", "\\(10^{-5}\\)", "\\(10^{5}\\)", "\\(10^{-6}\\)"],
        korrekt: 1,
        tipp: "Zähle, wie viele Stellen du das Komma nach rechts verschieben musst.",
        loesungsweg: "\\(0{,}00001 = \\frac{1}{100\\,000} = \\frac{1}{10^5} = 10^{-5}\\)."
    },
    {
        id: 20, level: 4, typ: "numerisch",
        frage: "Berechne: \\(10^{-3} \\cdot 10^{5}\\). Gib den Exponenten der Zehnerpotenz als ganze Zahl an.",
        loesung: 2,
        toleranz: 0,
        tipp: "Gleiche Basis: Exponenten addieren.",
        loesungsweg: "\\(10^{-3} \\cdot 10^{5} = 10^{-3+5} = 10^{2}\\). Der Exponent ist 2."
    },
    {
        id: 21, level: 4, typ: "mc",
        frage: "Welche der folgenden Zahlen ist in wissenschaftlicher Notation korrekt geschrieben?",
        optionen: [
            "\\(34{,}5 \\cdot 10^{3}\\)",
            "\\(3{,}45 \\cdot 10^{4}\\)",
            "\\(0{,}345 \\cdot 10^{5}\\)",
            "\\(345 \\cdot 10^{2}\\)"
        ],
        korrekt: 1,
        tipp: "Bei wissenschaftlicher Notation steht genau eine Stelle vor dem Komma (1–9).",
        loesungsweg: "\\(3{,}45 \\cdot 10^{4} = 34\\,500\\). Nur diese Form hat genau eine Stelle (3) vor dem Komma."
    },
    {
        id: 22, level: 4, typ: "mc",
        frage: "Was ist größer: \\(2^{-3}\\) oder \\(3^{-2}\\)?",
        optionen: [
            "\\(2^{-3}\\), weil \\(\\frac{1}{8} > \\frac{1}{9}\\)",
            "\\(3^{-2}\\), weil \\(\\frac{1}{9} > \\frac{1}{8}\\)",
            "Beide sind gleich",
            "\\(2^{-3}\\), weil \\(-3 < -2\\)"
        ],
        korrekt: 0,
        tipp: "Rechne beide Werte als Brüche aus und vergleiche.",
        loesungsweg: "\\(2^{-3} = \\frac{1}{8} \\approx 0{,}125\\) und \\(3^{-2} = \\frac{1}{9} \\approx 0{,}111\\). Da \\(\\frac{1}{8} > \\frac{1}{9}\\), ist \\(2^{-3}\\) größer."
    },
    {
        id: 23, level: 4, typ: "numerisch",
        frage: "Ein Bakterium hat einen Durchmesser von \\(2 \\cdot 10^{-6}\\,\\text{m}\\). Wie viele Bakterien passen nebeneinander auf \\(1\\,\\text{mm} = 10^{-3}\\,\\text{m}\\)? Gib die Antwort als ganze Zahl an.",
        loesung: 500,
        toleranz: 0,
        tipp: "Dividiere: \\(\\frac{10^{-3}}{2 \\cdot 10^{-6}}\\).",
        loesungsweg: "\\(\\frac{10^{-3}}{2 \\cdot 10^{-6}} = \\frac{1}{2} \\cdot 10^{-3-(-6)} = 0{,}5 \\cdot 10^{3} = 500\\)."
    },
    {
        id: 24, level: 4, typ: "mc",
        frage: "Vereinfache: \\(\\frac{6x^{-2} \\cdot x^3}{3x}\\).",
        optionen: ["\\(2x^{-2}\\)", "\\(2\\)", "\\(2x\\)", "\\(6x^{-1}\\)"],
        korrekt: 1,
        tipp: "Zähler zusammenfassen, dann kürzen.",
        loesungsweg: "Zähler: \\(6x^{-2} \\cdot x^3 = 6x^{1}\\). Dann: \\(\\frac{6x}{3x} = 2\\)."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 5: Gleichungen lösen und komplexe Termvereinfachungen
    // ═══════════════════════════════════════════════════════════════

    {
        id: 25, level: 5, typ: "numerisch",
        frage: "Löse: \\(x^{-2} = \\frac{1}{9}\\). Gib eine positive Lösung an.",
        loesung: 3,
        toleranz: 0,
        tipp: "Schreibe \\(x^{-2} = \\frac{1}{x^2}\\) und löse \\(x^2 = 9\\).",
        loesungsweg: "\\(x^{-2} = \\frac{1}{x^2} = \\frac{1}{9}\\) ergibt \\(x^2 = 9\\), also \\(x = 3\\) (positive Lösung)."
    },
    {
        id: 26, level: 5, typ: "numerisch",
        frage: "Löse: \\(2x^{-1} = 8\\). Gib den Wert von \\(x\\) an.",
        loesung: 0.25,
        toleranz: 0.001,
        tipp: "Schreibe \\(\\frac{2}{x} = 8\\) und löse nach \\(x\\) auf.",
        loesungsweg: "\\(\\frac{2}{x} = 8 \\Rightarrow x = \\frac{2}{8} = \\frac{1}{4} = 0{,}25\\)."
    },
    {
        id: 27, level: 5, typ: "mc",
        frage: "Vereinfache vollständig: \\(\\frac{(x^2)^{-3} \\cdot x^4}{x^{-2}}\\).",
        optionen: ["\\(x^{0} = 1\\)", "\\(x^{-2}\\)", "\\(x^{2}\\)", "\\(x^{-8}\\)"],
        korrekt: 0,
        tipp: "Schritt 1: \\((x^2)^{-3} = x^{-6}\\). Dann Exponenten im Zähler addieren, danach dividieren.",
        loesungsweg: "Schritt 1: \\((x^2)^{-3} = x^{-6}\\). Schritt 2 (Zähler): \\(x^{-6} \\cdot x^4 = x^{-2}\\). Schritt 3 (Division): \\(\\frac{x^{-2}}{x^{-2}} = x^{-2-(-2)} = x^{0} = 1\\)."
    },
    {
        id: 28, level: 5, typ: "mc",
        frage: "Löse die Gleichung \\(x^{-3} = -\\frac{1}{27}\\).",
        optionen: ["\\(x = 3\\)", "\\(x = -3\\)", "\\(x = \\frac{1}{3}\\)", "keine Lösung"],
        korrekt: 1,
        tipp: "Schreibe \\(\\frac{1}{x^3} = -\\frac{1}{27}\\). Welches \\(x^3\\) ergibt \\(-27\\)?",
        loesungsweg: "\\(\\frac{1}{x^3} = -\\frac{1}{27} \\Rightarrow x^3 = -27 \\Rightarrow x = -3\\)."
    },
    {
        id: 29, level: 5, typ: "mc",
        frage: "Vereinfache: \\(\\left(\\frac{x^{-2}}{y^3}\\right)^{-1}\\).",
        optionen: [
            "\\(\\frac{x^2}{y^3}\\)",
            "\\(\\frac{y^3}{x^2}\\)",
            "\\(x^2 y^3\\)",
            "\\(\\frac{x^{-2}}{y^{-3}}\\)"
        ],
        korrekt: 2,
        tipp: "Exponent \\(-1\\) bedeutet Kehrwert bilden: Zähler und Nenner tauschen, dann Vorzeichen der Exponenten wechseln.",
        loesungsweg: "\\(\\left(\\frac{x^{-2}}{y^3}\\right)^{-1} = \\frac{y^3}{x^{-2}} = y^3 \\cdot x^{2} = x^2 y^3\\)."
    },
    {
        id: 30, level: 5, typ: "numerisch",
        frage: "Berechne: \\(\\frac{4^{-2} \\cdot 4^5}{4^2}\\). Gib den Exponenten der Viererpotenz als ganze Zahl an.",
        loesung: 1,
        toleranz: 0,
        tipp: "Zähler: Exponenten addieren. Dann vom Nenner subtrahieren.",
        loesungsweg: "\\(4^{-2} \\cdot 4^5 = 4^{3}\\). Dann: \\(\\frac{4^3}{4^2} = 4^{3-2} = 4^1\\). Exponent = 1."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 6: Textaufgaben (umgekehrte Proportionalität)
    // ═══════════════════════════════════════════════════════════════

    {
        id: 31, level: 6, typ: "numerisch",
        frage: "Bei konstanter Temperatur gilt für ein Gas das Gesetz \\(p \\cdot V = 120\\) (in passenden Einheiten). Wie groß ist der Druck \\(p\\), wenn \\(V = 4\\)?",
        loesung: 30,
        toleranz: 0,
        tipp: "Löse die Gleichung \\(p \\cdot V = 120\\) nach \\(p\\) auf.",
        loesungsweg: "\\(p = \\frac{120}{V} = \\frac{120}{4} = 30\\). Der Druck beträgt 30 Einheiten."
    },
    {
        id: 32, level: 6, typ: "numerisch",
        frage: "Ein Gas erfüllt \\(p \\cdot V = 60\\). Bei welchem Volumen \\(V\\) beträgt der Druck \\(p = 12\\)?",
        loesung: 5,
        toleranz: 0,
        tipp: "Aus \\(p \\cdot V = 60\\) folgt \\(V = \\frac{60}{p}\\).",
        loesungsweg: "\\(V = \\frac{60}{p} = \\frac{60}{12} = 5\\)."
    },
    {
        id: 33, level: 6, typ: "mc",
        frage: "Druck \\(p\\) und Volumen \\(V\\) sind bei konstanter Temperatur umgekehrt proportional. Welche Funktionsgleichung beschreibt diesen Zusammenhang?",
        optionen: [
            "\\(p(V) = k \\cdot V\\)",
            "\\(p(V) = \\frac{k}{V}\\)",
            "\\(p(V) = V^2\\)",
            "\\(p(V) = k + V\\)"
        ],
        korrekt: 1,
        tipp: "Umgekehrte Proportionalität heißt: Produkt ist konstant.",
        loesungsweg: "Umgekehrte Proportionalität: \\(p \\cdot V = k\\), also \\(p(V) = \\frac{k}{V}\\). Das ist eine Hyperbel."
    },
    {
        id: 34, level: 6, typ: "numerisch",
        frage: "Für ein Gas gilt \\(p(V) = \\frac{200}{V}\\). Verdoppelt man das Volumen von \\(V = 10\\) auf \\(V = 20\\), wie groß ist der neue Druck?",
        loesung: 10,
        toleranz: 0,
        tipp: "Setze \\(V = 20\\) in die Formel ein.",
        loesungsweg: "\\(p(20) = \\frac{200}{20} = 10\\). Bei Verdopplung des Volumens halbiert sich der Druck (von 20 auf 10)."
    },
    {
        id: 35, level: 6, typ: "numerisch",
        frage: "6 Arbeiter benötigen für eine Aufgabe 12 Stunden. Wie viele Stunden brauchen 8 Arbeiter (bei gleicher Arbeitsleistung)?",
        loesung: 9,
        toleranz: 0,
        tipp: "Umgekehrte Proportionalität: Arbeiter-Anzahl mal Stunden = konstant.",
        loesungsweg: "Konstante: \\(6 \\cdot 12 = 72\\) Arbeiterstunden. Für 8 Arbeiter: \\(t = \\frac{72}{8} = 9\\) Stunden."
    },
    {
        id: 36, level: 6, typ: "mc",
        frage: "Welche der folgenden Aussagen über \\(f(x) = \\frac{a}{x^n}\\) mit \\(a \\neq 0\\) und \\(n \\in \\mathbb{N}\\) ist falsch?",
        optionen: [
            "\\(f(x) = a \\cdot x^{-n}\\)",
            "\\(f(-x) = f(x)\\) gilt für alle geraden \\(n\\)",
            "\\(f(x)\\) ist für \\(x = 0\\) nicht definiert",
            "\\(f(x) = a \\cdot x^{-n}\\) ist dasselbe wie \\(f(x) = a \\cdot (-x)^n\\)"
        ],
        korrekt: 3,
        tipp: "Prüfe jede Aussage mit der Definition \\(x^{-n} = \\frac{1}{x^n}\\). Bei Option D: Vergleiche \\(x^{-n}\\) und \\((-x)^n\\).",
        loesungsweg: "A: korrekt (Definition negativer Exponent). B: korrekt, da \\((-x)^n = x^n\\) für gerades \\(n\\), also \\(f(-x) = \\frac{a}{(-x)^n} = \\frac{a}{x^n} = f(x)\\). C: korrekt, Nenner \\(x^n = 0\\) bei \\(x = 0\\). D: falsch — \\(x^{-n} = \\frac{1}{x^n}\\), aber \\((-x)^n = x^n\\) (für gerades \\(n\\)) oder \\(-x^n\\) (für ungerades \\(n\\)) — das ist nicht dasselbe wie \\(x^{-n}\\)."
    }

    ];
    </script>
