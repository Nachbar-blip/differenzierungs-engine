    const AUFGABEN = [

    // ══════════════════════════════════════════════════════════════

    // ══════════════════════════════════════════════════════════════
    {

        frage: "Gegeben sind \\(\\vec{a} = \\begin{pmatrix} 3 \\\\ 5 \\end{pmatrix}\\) und \\(\\vec{b} = \\begin{pmatrix} 2 \\\\ -1 \\end{pmatrix}\\). Berechne die erste Komponente von \\(\\vec{a} + \\vec{b}\\).",

        tipp: "Der Gegenvektor \\(-\\vec{a}\\) hat in jeder Komponente das umgekehrte Vorzeichen.",
        loesungsweg: "\\(-\\vec{a} = \\begin{pmatrix} 2 \\\\ -6 \\end{pmatrix}\\). Die zweite Komponente ist \\(-6\\)."
    },
    {

    // ══════════════════════════════════════════════════════════════
    // LEVEL 2 — R³-Vektoren, Skalarmultiplikation
    // ══════════════════════════════════════════════════════════════
    {
        id: 7, level: 2, typ: "numerisch",
        frage: "Gegeben ist \\(\\vec{a} = \\begin{pmatrix} 2 \\\\ -3 \\\\ 5 \\end{pmatrix}\\). Berechne die dritte Komponente von \\(3\\vec{a}\\).",

        tipp: "Komponentenweise addieren: \\(4 + (-1) = ?\\).",
        loesungsweg: "\\(\\vec{a} + \\vec{b} = \\begin{pmatrix} 1+3 \\\\ 4+(-1) \\\\ -2+5 \\end{pmatrix} = \\begin{pmatrix} 4 \\\\ 3 \\\\ 3 \\end{pmatrix}\\). Die zweite Komponente ist \\(3\\)."
    },
    {

        korrekt: 0,
        tipp: "Multipliziere jede Komponente mit \\(-2\\).",
        loesungsweg: "\\(-2 \\cdot \\begin{pmatrix} 1 \\\\ -3 \\\\ 2 \\end{pmatrix} = \\begin{pmatrix} -2 \\\\ 6 \\\\ -4 \\end{pmatrix}\\)."

    {

        frage: "Punkte \\(A(2, 1, -3)\\) und \\(B(5, -2, 4)\\). Berechne die dritte Komponente von \\(\\overrightarrow{AB}\\).",

        tipp: "\\(\\overrightarrow{AB} = B - A\\), also dritte Komponente: \\(4 - (-3)\\).",

    },
    {
        id: 12, level: 2, typ: "numerisch",
        frage: "Berechne die zweite Komponente des Mittelpunkts \\(M\\) der Strecke \\(\\overline{AB}\\) mit \\(A(2, 6, -4)\\) und \\(B(4, -2, 8)\\).",
        loesung: 2, toleranz: 0,
        tipp: "Mittelpunkt: \\(M = \\frac{1}{2}(\\vec{a} + \\vec{b})\\).",
        loesungsweg: "\\(M = \\frac{1}{2}\\begin{pmatrix} 2+4 \\\\ 6+(-2) \\\\ -4+8 \\end{pmatrix} = \\frac{1}{2}\\begin{pmatrix} 6 \\\\ 4 \\\\ 4 \\end{pmatrix} = \\begin{pmatrix} 3 \\\\ 2 \\\\ 2 \\end{pmatrix}\\). Zweite Komponente: \\(2\\)."

    // ══════════════════════════════════════════════════════════════
    // LEVEL 3 — Betrag berechnen, Einheitsvektoren
    // ══════════════════════════════════════════════════════════════
    {

        loesung: 5, toleranz: 0,

    },

    {

    },
    {
        id: 23, level: 4, typ: "numerisch",
        frage: "Berechne den Winkel (in Grad) zwischen \\(\\vec{a} = \\begin{pmatrix} 1 \\\\ 1 \\\\ 0 \\end{pmatrix}\\) und \\(\\vec{b} = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}\\). Runde auf ganze Grad.",

        tipp: "\\(\\cos(\\varphi) = \\frac{\\vec{a} \\cdot \\vec{b}}{|\\vec{a}| \\cdot |\\vec{b}|}\\). Berechne zuerst das Skalarprodukt, dann die Beträge.",

    // ══════════════════════════════════════════════════════════════

        tipp: "Kollinear heißt \\(\\vec{b} = r \\cdot \\vec{a}\\). Aus den ersten Komponenten: \\(r = \\frac{4}{2} = 2\\). Also muss \\(t = 2 \\cdot 1\\) gelten.",
        loesungsweg: "Aus \\(\\frac{4}{2} = 2\\) und \\(\\frac{-6}{-3} = 2\\) folgt \\(r = 2\\). Damit: \\(t = 2 \\cdot 1 = 2\\)."
    },
    {
        id: 28, level: 5, typ: "mc",
        frage: "Drei Vektoren \\(\\vec{a}, \\vec{b}, \\vec{c}\\) sind komplanar, wenn:",
        optionen: [
            "\\(\\vec{c}\\) als Linearkombination von \\(\\vec{a}\\) und \\(\\vec{b}\\) darstellbar ist",

            "alle drei den gleichen Betrag haben",
            "das Skalarprodukt aller Paare gleich 0 ist"
        ],
        korrekt: 0,
        tipp: "Komplanar = in einer Ebene liegend. Das Spatprodukt ist dann 0.",
        loesungsweg: "Drei Vektoren sind komplanar, wenn sie linear abhängig sind, d.h. \\(\\vec{c} = s \\cdot \\vec{a} + t \\cdot \\vec{b}\\). Äquivalent: Spatprodukt \\(= 0\\)."
    },
    {
        id: 29, level: 5, typ: "numerisch",
        frage: "Berechne das Spatprodukt \\((\\vec{a}, \\vec{b}, \\vec{c})\\) mit \\(\\vec{a} = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}\\), \\(\\vec{b} = \\begin{pmatrix} 0 \\\\ 1 \\\\ 0 \\end{pmatrix}\\), \\(\\vec{c} = \\begin{pmatrix} 0 \\\\ 0 \\\\ 1 \\end{pmatrix}\\).",
        loesung: 1, toleranz: 0,
        tipp: "Das Spatprodukt ist die Determinante der 3×3-Matrix aus den drei Spaltenvektoren.",

    },
    {

    },

        frage: "Stelle \\(\\vec{c} = \\begin{pmatrix} 5 \\\\ 1 \\\\ 3 \\end{pmatrix}\\) als Linearkombination \\(\\vec{c} = s \\cdot \\vec{a} + t \\cdot \\vec{b}\\) dar mit \\(\\vec{a} = \\begin{pmatrix} 1 \\\\ 1 \\\\ 1 \\end{pmatrix}\\), \\(\\vec{b} = \\begin{pmatrix} 1 \\\\ -1 \\\\ 0 \\end{pmatrix}\\). Berechne \\(s\\).",
