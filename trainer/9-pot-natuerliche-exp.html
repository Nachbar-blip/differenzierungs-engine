<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potenzfunktionen (nat. Exp.) - DifferenzierungsEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="../spirale.css">
    <style>:root { --spirale-primary: #667eea; --spirale-secondary: #764ba2; }</style>
</head>
<body>
    <div class="spirale-container" id="app"></div>
    <script>
    const THEMA_KEY = '9-pot-natuerliche-exp';
    const THEMA_CONFIG = { name: 'Potenzfunktionen (nat. Exp.)', bereich: 'analysis' };
    const AUFGABEN = [
      // ========== LEVEL 1 — babyleicht: f(x) = x^n an einer Stelle berechnen ==========
      {
        "id": 1,
        "level": 1,
        "typ": "mc",
        "frage": "Gegeben ist \\(f(x) = x^2\\). Welchen Wert hat \\(f(3)\\)?",
        "optionen": ["\\(6\\)", "\\(9\\)", "\\(5\\)", "\\(8\\)"],
        "korrekt": 1,
        "tipp": "Setze \\(x = 3\\) in \\(x^2\\) ein.",
        "loesungsweg": "$$f(3) = 3^2 = 3 \\cdot 3 = 9$$"
      },
      {
        "id": 2,
        "level": 1,
        "typ": "mc",
        "frage": "Gegeben ist \\(f(x) = x^3\\). Welchen Wert hat \\(f(2)\\)?",
        "optionen": ["\\(6\\)", "\\(9\\)", "\\(8\\)", "\\(4\\)"],
        "korrekt": 2,
        "tipp": "Setze \\(x = 2\\) in \\(x^3\\) ein.",
        "loesungsweg": "$$f(2) = 2^3 = 2 \\cdot 2 \\cdot 2 = 8$$"
      },
      {
        "id": 3,
        "level": 1,
        "typ": "numerisch",
        "frage": "Gegeben ist \\(f(x) = x^4\\). Berechne \\(f(2)\\).",
        "loesung": 16,
        "toleranz": 0,
        "tipp": "Viermal die 2 miteinander multiplizieren.",
        "loesungsweg": "$$f(2) = 2^4 = 2 \\cdot 2 \\cdot 2 \\cdot 2 = 16$$"
      },
      {
        "id": 4,
        "level": 1,
        "typ": "mc",
        "frage": "Gegeben ist \\(f(x) = x^3\\). Welchen Wert hat \\(f(-2)\\)?",
        "optionen": ["\\(8\\)", "\\(-8\\)", "\\(6\\)", "\\(-6\\)"],
        "korrekt": 1,
        "tipp": "Denke daran: Ungerade Potenz einer negativen Zahl bleibt negativ.",
        "loesungsweg": "$$f(-2) = (-2)^3 = (-2) \\cdot (-2) \\cdot (-2) = -8$$"
      },
      {
        "id": 5,
        "level": 1,
        "typ": "numerisch",
        "frage": "Gegeben ist \\(f(x) = x^2\\). Berechne \\(f(-5)\\).",
        "loesung": 25,
        "toleranz": 0,
        "tipp": "Gerade Potenz einer negativen Zahl ist positiv.",
        "loesungsweg": "$$f(-5) = (-5)^2 = 25$$"
      },
      {
        "id": 6,
        "level": 1,
        "typ": "numerisch",
        "frage": "Gegeben ist \\(f(x) = x^5\\). Berechne \\(f(2)\\).",
        "loesung": 32,
        "toleranz": 0,
        "tipp": "\\(2^5 = 2 \\cdot 2 \\cdot 2 \\cdot 2 \\cdot 2\\)",
        "loesungsweg": "$$f(2) = 2^5 = 32$$"
      },

      // ========== LEVEL 2 — leicht: Potenzgesetze anwenden (ein Gesetz) ==========
      {
        "id": 7,
        "level": 2,
        "typ": "mc",
        "frage": "Vereinfache: \\(x^3 \\cdot x^5\\)",
        "optionen": ["\\(x^{15}\\)", "\\(x^{8}\\)", "\\(x^{2}\\)", "\\(2x^{8}\\)"],
        "korrekt": 1,
        "tipp": "Bei gleicher Basis werden die Exponenten addiert: \\(x^a \\cdot x^b = x^{a+b}\\).",
        "loesungsweg": "$$x^3 \\cdot x^5 = x^{3+5} = x^8$$"
      },
      {
        "id": 8,
        "level": 2,
        "typ": "mc",
        "frage": "Vereinfache: \\((x^4)^3\\)",
        "optionen": ["\\(x^{7}\\)", "\\(x^{12}\\)", "\\(x^{43}\\)", "\\(3x^4\\)"],
        "korrekt": 1,
        "tipp": "Potenzen von Potenzen: \\((x^a)^b = x^{a \\cdot b}\\).",
        "loesungsweg": "$$(x^4)^3 = x^{4 \\cdot 3} = x^{12}$$"
      },
      {
        "id": 9,
        "level": 2,
        "typ": "mc",
        "frage": "Vereinfache: \\(x^7 : x^3\\)",
        "optionen": ["\\(x^{21}\\)", "\\(x^{10}\\)", "\\(x^{4}\\)", "\\(x^{3}\\)"],
        "korrekt": 2,
        "tipp": "Bei Division mit gleicher Basis werden die Exponenten subtrahiert: \\(x^a : x^b = x^{a-b}\\).",
        "loesungsweg": "$$x^7 : x^3 = x^{7-3} = x^4$$"
      },
      {
        "id": 10,
        "level": 2,
        "typ": "mc",
        "frage": "Vereinfache: \\((2x)^3\\)",
        "optionen": ["\\(2x^3\\)", "\\(6x^3\\)", "\\(8x^3\\)", "\\(8x\\)"],
        "korrekt": 2,
        "tipp": "\\((a \\cdot b)^n = a^n \\cdot b^n\\). Denke daran, auch die \\(2\\) zu potenzieren.",
        "loesungsweg": "$$(2x)^3 = 2^3 \\cdot x^3 = 8x^3$$"
      },
      {
        "id": 11,
        "level": 2,
        "typ": "numerisch",
        "frage": "Berechne: \\(2^3 \\cdot 2^4\\)",
        "loesung": 128,
        "toleranz": 0,
        "tipp": "Erst die Exponenten addieren, dann ausrechnen: \\(2^{3+4} = 2^7\\).",
        "loesungsweg": "$$2^3 \\cdot 2^4 = 2^{3+4} = 2^7 = 128$$"
      },
      {
        "id": 12,
        "level": 2,
        "typ": "mc",
        "frage": "Welcher Ausdruck ist gleich \\(a^6\\)?",
        "optionen": ["\\(a^2 \\cdot a^2 \\cdot a^2\\)", "\\((a^2)^4\\)", "\\(a^4 \\cdot a^3\\)", "\\(a^6 + a^0\\)"],
        "korrekt": 0,
        "tipp": "Prüfe jeden Ausdruck mit dem Additionsgesetz der Exponenten.",
        "loesungsweg": "\\(a^2 \\cdot a^2 \\cdot a^2 = a^{2+2+2} = a^6\\) ✓. Die anderen: \\((a^2)^4 = a^8\\), \\(a^4 \\cdot a^3 = a^7\\), \\(a^6 + a^0 \\neq a^6\\)."
      },

      // ========== LEVEL 3 — mittel: Termvereinfachung mit mehreren Potenzgesetzen ==========
      {
        "id": 13,
        "level": 3,
        "typ": "mc",
        "frage": "Vereinfache: \\(x^3 \\cdot x^4 \\cdot x^2\\)",
        "optionen": ["\\(x^{24}\\)", "\\(x^{9}\\)", "\\(3x^{9}\\)", "\\(x^{14}\\)"],
        "korrekt": 1,
        "tipp": "Alle Exponenten addieren: \\(3 + 4 + 2 = ?\\)",
        "loesungsweg": "$$x^3 \\cdot x^4 \\cdot x^2 = x^{3+4+2} = x^9$$"
      },
      {
        "id": 14,
        "level": 3,
        "typ": "mc",
        "frage": "Vereinfache: \\((x^2)^3 \\cdot x^4\\)",
        "optionen": ["\\(x^{9}\\)", "\\(x^{10}\\)", "\\(x^{24}\\)", "\\(x^{5}\\)"],
        "korrekt": 1,
        "tipp": "Erst \\((x^2)^3\\) auflösen, dann mit \\(x^4\\) multiplizieren.",
        "loesungsweg": "$$(x^2)^3 \\cdot x^4 = x^6 \\cdot x^4 = x^{6+4} = x^{10}$$"
      },
      {
        "id": 15,
        "level": 3,
        "typ": "mc",
        "frage": "Welche Aussage zum Vergleich von \\(x^2\\) und \\(x^4\\) auf dem Intervall \\((0;1)\\) ist richtig?",
        "optionen": [
          "Es gilt \\(x^4 > x^2\\)",
          "Es gilt \\(x^4 < x^2\\)",
          "Es gilt \\(x^4 = x^2\\)",
          "Die Ungleichung wechselt"
        ],
        "korrekt": 1,
        "tipp": "Probiere \\(x = 0{,}5\\): Was ist größer, \\(0{,}25\\) oder \\(0{,}0625\\)?",
        "loesungsweg": "Für \\(0 < x < 1\\) wird die Potenz bei höherem Exponenten **kleiner**. Beispiel \\(x = 0{,}5\\): \\(0{,}5^2 = 0{,}25\\), \\(0{,}5^4 = 0{,}0625\\). Also \\(x^4 < x^2\\) auf \\((0;1)\\)."
      },
      {
        "id": 16,
        "level": 3,
        "typ": "mc",
        "frage": "Vereinfache: \\(\\dfrac{a^8 \\cdot a^2}{a^5}\\)",
        "optionen": ["\\(a^{5}\\)", "\\(a^{4}\\)", "\\(a^{16}\\)", "\\(a^{3}\\)"],
        "korrekt": 0,
        "tipp": "Zähler: Exponenten addieren. Dann durch \\(a^5\\) dividieren: Exponenten subtrahieren.",
        "loesungsweg": "$$\\frac{a^8 \\cdot a^2}{a^5} = \\frac{a^{8+2}}{a^5} = \\frac{a^{10}}{a^5} = a^{10-5} = a^5$$"
      },
      {
        "id": 17,
        "level": 3,
        "typ": "numerisch",
        "frage": "Berechne: \\(\\dfrac{3^6}{3^4}\\)",
        "loesung": 9,
        "toleranz": 0,
        "tipp": "\\(3^6 : 3^4 = 3^{6-4}\\)",
        "loesungsweg": "$$\\frac{3^6}{3^4} = 3^{6-4} = 3^2 = 9$$"
      },
      {
        "id": 18,
        "level": 3,
        "typ": "mc",
        "frage": "Welche Eigenschaft haben alle Funktionen \\(f(x) = x^n\\) mit \\(n \\in \\mathbb{N}\\) gemeinsam?",
        "optionen": [
          "Sie sind alle achsensymmetrisch",
          "Sie verlaufen alle durch \\((0|0)\\) und \\((1|1)\\)",
          "Sie haben alle zwei Nullstellen",
          "Sie verlaufen alle nur im 1. Quadranten"
        ],
        "korrekt": 1,
        "tipp": "Setze \\(x = 0\\) und \\(x = 1\\) ein.",
        "loesungsweg": "Für jedes \\(n \\in \\mathbb{N}\\) gilt \\(0^n = 0\\) und \\(1^n = 1\\). Damit verlaufen alle Graphen durch **\\((0|0)\\) und \\((1|1)\\)**."
      },

      // ========== LEVEL 4 — mittel-schwer: Anwendungsaufgaben (Volumen, Fläche, Zehnerpotenzen) ==========
      {
        "id": 19,
        "level": 4,
        "typ": "numerisch",
        "frage": "Ein Würfel hat die Kantenlänge \\(a = 4\\,\\text{cm}\\). Berechne sein Volumen in \\(\\text{cm}^3\\).",
        "loesung": 64,
        "toleranz": 0,
        "tipp": "Das Volumen eines Würfels berechnet sich mit \\(V = a^3\\).",
        "loesungsweg": "$$V = a^3 = 4^3 = 4 \\cdot 4 \\cdot 4 = 64\\,\\text{cm}^3$$"
      },
      {
        "id": 20,
        "level": 4,
        "typ": "numerisch",
        "frage": "Ein quadratisches Schachbrett hat die Seitenlänge \\(s = 5\\,\\text{dm}\\). Berechne seine Fläche in \\(\\text{dm}^2\\).",
        "loesung": 25,
        "toleranz": 0,
        "tipp": "Fläche eines Quadrats: \\(A = s^2\\).",
        "loesungsweg": "$$A = s^2 = 5^2 = 25\\,\\text{dm}^2$$"
      },
      {
        "id": 21,
        "level": 4,
        "typ": "numerisch",
        "frage": "Ein Würfel hat die Kantenlänge \\(a = 3\\,\\text{cm}\\). Berechne die Oberfläche des Würfels in \\(\\text{cm}^2\\). (Oberfläche = \\(6 \\cdot a^2\\))",
        "loesung": 54,
        "toleranz": 0,
        "tipp": "Berechne erst \\(a^2 = 3^2\\), dann mit 6 multiplizieren.",
        "loesungsweg": "$$O = 6 \\cdot a^2 = 6 \\cdot 3^2 = 6 \\cdot 9 = 54\\,\\text{cm}^2$$"
      },
      {
        "id": 22,
        "level": 4,
        "typ": "mc",
        "frage": "Welchen Wert hat \\(10^6\\)?",
        "optionen": ["\\(60\\)", "\\(100\\,000\\)", "\\(1\\,000\\,000\\)", "\\(10\\,000\\,000\\)"],
        "korrekt": 2,
        "tipp": "\\(10^n\\) hat eine \\(1\\) gefolgt von \\(n\\) Nullen.",
        "loesungsweg": "$$10^6 = 1\\,000\\,000 \\quad \\text{(eine Million)}$$"
      },
      {
        "id": 23,
        "level": 4,
        "typ": "numerisch",
        "frage": "Ein Quader hat die Maße Länge \\(l = 2\\,\\text{m}\\), Breite \\(b = 2\\,\\text{m}\\), Höhe \\(h = 2\\,\\text{m}\\). Berechne das Volumen in \\(\\text{m}^3\\).",
        "loesung": 8,
        "toleranz": 0,
        "tipp": "\\(V = l \\cdot b \\cdot h = 2 \\cdot 2 \\cdot 2 = 2^3\\)",
        "loesungsweg": "$$V = 2 \\cdot 2 \\cdot 2 = 2^3 = 8\\,\\text{m}^3$$"
      },
      {
        "id": 24,
        "level": 4,
        "typ": "mc",
        "frage": "Welche Darstellung als Potenz ist ein Rechenvorteil bei \\(2 \\cdot 2 \\cdot 2 \\cdot 2 \\cdot 2 \\cdot 2 \\cdot 2\\)?",
        "optionen": ["\\(7^2\\)", "\\(2^7\\)", "\\(14\\)", "\\(2 \\cdot 7\\)"],
        "korrekt": 1,
        "tipp": "Zähle, wie oft die \\(2\\) als Faktor vorkommt.",
        "loesungsweg": "Die Zahl \\(2\\) erscheint \\(7\\)-mal als Faktor: $$2 \\cdot 2 \\cdot 2 \\cdot 2 \\cdot 2 \\cdot 2 \\cdot 2 = 2^7 = 128$$"
      },

      // ========== LEVEL 5 — schwer: Gleichungen x^n = k lösen, komplexe Vereinfachungen ==========
      {
        "id": 25,
        "level": 5,
        "typ": "numerisch",
        "frage": "Löse die Gleichung \\(x^2 = 81\\) für \\(x > 0\\).",
        "loesung": 9,
        "toleranz": 0,
        "tipp": "Gesucht ist eine positive Zahl, die mit sich selbst multipliziert 81 ergibt.",
        "loesungsweg": "$$x^2 = 81 \\Rightarrow x = 9 \\quad (x > 0)$$"
      },
      {
        "id": 26,
        "level": 5,
        "typ": "numerisch",
        "frage": "Löse die Gleichung \\(x^3 = 125\\).",
        "loesung": 5,
        "toleranz": 0,
        "tipp": "Gesucht ist eine Zahl, die dreimal mit sich selbst multipliziert 125 ergibt.",
        "loesungsweg": "$$x^3 = 125 \\Rightarrow x = 5, \\text{ denn } 5^3 = 5 \\cdot 5 \\cdot 5 = 125$$"
      },
      {
        "id": 27,
        "level": 5,
        "typ": "mc",
        "frage": "Vereinfache vollständig: \\(\\dfrac{(a^3)^2 \\cdot a}{a^4}\\)",
        "optionen": ["\\(a^{3}\\)", "\\(a^{4}\\)", "\\(a^{2}\\)", "\\(a^{9}\\)"],
        "korrekt": 0,
        "tipp": "Erst \\((a^3)^2 = a^6\\), dann Zähler zusammenfassen, dann dividieren.",
        "loesungsweg": "$$\\frac{(a^3)^2 \\cdot a}{a^4} = \\frac{a^6 \\cdot a}{a^4} = \\frac{a^7}{a^4} = a^{7-4} = a^3$$"
      },
      {
        "id": 28,
        "level": 5,
        "typ": "numerisch",
        "frage": "Löse: \\(2 \\cdot x^3 = 250\\).",
        "loesung": 5,
        "toleranz": 0,
        "tipp": "Erst beide Seiten durch 2 dividieren, dann die Gleichung \\(x^3 = 125\\) lösen.",
        "loesungsweg": "$$2 \\cdot x^3 = 250 \\Rightarrow x^3 = 125 \\Rightarrow x = 5$$"
      },
      {
        "id": 29,
        "level": 5,
        "typ": "mc",
        "frage": "Vereinfache: \\((2a^2)^3 \\cdot (a^3)^2\\)",
        "optionen": ["\\(8a^{12}\\)", "\\(8a^{9}\\)", "\\(6a^{12}\\)", "\\(8a^{5}\\)"],
        "korrekt": 0,
        "tipp": "Erst \\((2a^2)^3 = 2^3 \\cdot a^6 = 8a^6\\) und \\((a^3)^2 = a^6\\), dann multiplizieren.",
        "loesungsweg": "$$(2a^2)^3 \\cdot (a^3)^2 = 8a^6 \\cdot a^6 = 8a^{6+6} = 8a^{12}$$"
      },
      {
        "id": 30,
        "level": 5,
        "typ": "numerisch",
        "frage": "Berechne: \\(\\dfrac{(2^3)^2}{2^4}\\)",
        "loesung": 4,
        "toleranz": 0,
        "tipp": "Zähler: \\((2^3)^2 = 2^6\\). Dann \\(2^6 : 2^4\\) berechnen.",
        "loesungsweg": "$$\\frac{(2^3)^2}{2^4} = \\frac{2^6}{2^4} = 2^{6-4} = 2^2 = 4$$"
      },

      // ========== LEVEL 6 — sehr schwer: Funktionsgleichung aus Eigenschaften aufstellen ==========
      {
        "id": 31,
        "level": 6,
        "typ": "numerisch",
        "frage": "Der Graph von \\(f(x) = a \\cdot x^n\\) verläuft durch \\(P(1|3)\\) und \\(Q(2|24)\\). Bestimme \\(n\\).",
        "loesung": 3,
        "toleranz": 0,
        "tipp": "Aus \\(P\\) folgt \\(a = 3\\). Setze dies dann in die Gleichung für \\(Q\\) ein.",
        "loesungsweg": "Aus \\(P(1|3)\\): \\(a \\cdot 1^n = a = 3\\). Aus \\(Q(2|24)\\): $$3 \\cdot 2^n = 24 \\Rightarrow 2^n = 8 \\Rightarrow n = 3$$"
      },
      {
        "id": 32,
        "level": 6,
        "typ": "numerisch",
        "frage": "Der Graph von \\(f(x) = a \\cdot x^n\\) verläuft durch \\(P(1|2)\\) und \\(Q(3|162)\\). Bestimme \\(n\\).",
        "loesung": 4,
        "toleranz": 0,
        "tipp": "Aus \\(P\\): \\(a = 2\\). Dann \\(2 \\cdot 3^n = 162\\).",
        "loesungsweg": "Aus \\(P(1|2)\\): \\(a = 2\\). Aus \\(Q(3|162)\\): $$2 \\cdot 3^n = 162 \\Rightarrow 3^n = 81 \\Rightarrow n = 4$$"
      },
      {
        "id": 33,
        "level": 6,
        "typ": "mc",
        "frage": "Gesucht ist eine Potenzfunktion der Form \\(f(x) = a \\cdot x^3\\), die durch \\(P(2|-16)\\) verläuft. Wie lautet sie?",
        "optionen": [
          "\\(f(x) = -2 x^3\\)",
          "\\(f(x) = 2 x^3\\)",
          "\\(f(x) = -4 x^3\\)",
          "\\(f(x) = -\\tfrac{1}{2} x^3\\)"
        ],
        "korrekt": 0,
        "tipp": "Setze die Koordinaten von \\(P\\) in \\(f(x) = a \\cdot x^3\\) ein und löse nach \\(a\\).",
        "loesungsweg": "Einsetzen von \\(P(2|-16)\\): $$a \\cdot 2^3 = -16 \\Rightarrow 8a = -16 \\Rightarrow a = -2$$ Also \\(f(x) = -2x^3\\)."
      },
      {
        "id": 34,
        "level": 6,
        "typ": "numerisch",
        "frage": "Die Funktion \\(f(x) = (x-d)^4\\) hat die Nullstelle \\(x_0 = 3\\). Bestimme \\(d\\).",
        "loesung": 3,
        "toleranz": 0,
        "tipp": "\\((x-d)^4 = 0 \\Leftrightarrow x = d\\).",
        "loesungsweg": "Aus \\((x-d)^4 = 0\\) folgt \\(x = d\\). Da die Nullstelle bei \\(x_0 = 3\\) liegt, muss \\(d = 3\\) sein."
      },
      {
        "id": 35,
        "level": 6,
        "typ": "numerisch",
        "frage": "Gegeben: \\(f(x) = a \\cdot (x-1)^2 + 3\\). Der Graph verläuft durch \\(P(3|11)\\). Bestimme \\(a\\).",
        "loesung": 2,
        "toleranz": 0,
        "tipp": "Einsetzen: \\(a \\cdot (3-1)^2 + 3 = 11\\).",
        "loesungsweg": "$$a \\cdot (3-1)^2 + 3 = 11 \\Rightarrow a \\cdot 4 + 3 = 11 \\Rightarrow 4a = 8 \\Rightarrow a = 2$$"
      },
      {
        "id": 36,
        "level": 6,
        "typ": "numerisch",
        "frage": "Die Funktion \\(f(x) = a \\cdot (x - d)^3\\) verläuft durch \\((2|0)\\) und \\((4|16)\\). Bestimme \\(a\\).",
        "loesung": 2,
        "toleranz": 0,
        "tipp": "Aus der Nullstelle folgt \\(d\\); dann mit dem zweiten Punkt \\(a\\) berechnen.",
        "loesungsweg": "Nullstelle bei \\(x = 2\\): \\(a(2-d)^3 = 0 \\Rightarrow d = 2\\). Einsetzen von \\((4|16)\\): $$a \\cdot (4-2)^3 = 16 \\Rightarrow 8a = 16 \\Rightarrow a = 2$$"
      }
    ];
    </script>
    <script src="../spirale-engine.js"></script>
</body>
</html>
