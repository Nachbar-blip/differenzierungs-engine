<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineare Funktionen (Wdh.) - DifferenzierungsEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="../spirale.css">
    <style>:root { --spirale-primary: #667eea; --spirale-secondary: #764ba2; }</style>
</head>
<body>
    <div class="spirale-container" id="app"></div>
    <script>
    const THEMA_KEY = '9-func-linear-wdh';
    const THEMA_CONFIG = { name: 'Lineare Funktionen (Wdh.)', bereich: 'analysis' };
    const AUFGABEN = [
        // ===== Level 1: Anstieg und y-Achsenabschnitt ablesen =====
        {
            id: 1, level: 1, typ: "mc",
            frage: "Welchen Anstieg \\(m\\) hat die Gerade \\(f(x) = 3x + 5\\)?",
            optionen: ["\\(m = 5\\)", "\\(m = 3\\)", "\\(m = -3\\)", "\\(m = 8\\)"],
            korrekt: 1,
            tipp: "In \\(y = mx + n\\) ist \\(m\\) der Faktor vor \\(x\\).",
            loesungsweg: "In der Form \\(y = mx + n\\) steht \\(m\\) als Faktor vor \\(x\\). Hier ist \\(m = 3\\)."
        },
        {
            id: 2, level: 1, typ: "mc",
            frage: "Welchen y-Achsenabschnitt \\(n\\) hat die Gerade \\(f(x) = -2x + 7\\)?",
            optionen: ["\\(n = -2\\)", "\\(n = 2\\)", "\\(n = 7\\)", "\\(n = -7\\)"],
            korrekt: 2,
            tipp: "Der y-Achsenabschnitt ist das konstante Glied der Gleichung.",
            loesungsweg: "In \\(y = mx + n\\) ist \\(n\\) der konstante Summand. Hier: \\(n = 7\\)."
        },
        {
            id: 3, level: 1, typ: "mc",
            frage: "Welche Aussage trifft auf \\(f(x) = -\\frac{1}{2}x + 4\\) zu?",
            optionen: [
                "Gerade steigt, schneidet y-Achse bei \\(4\\)",
                "Gerade fällt, schneidet y-Achse bei \\(4\\)",
                "Gerade fällt, schneidet y-Achse bei \\(-\\frac{1}{2}\\)",
                "Gerade steigt, schneidet y-Achse bei \\(-\\frac{1}{2}\\)"
            ],
            korrekt: 1,
            tipp: "Negatives \\(m\\) bedeutet fallende Gerade. \\(n\\) ist der y-Achsenabschnitt.",
            loesungsweg: "\\(m = -\\frac{1}{2} < 0\\), also fällt die Gerade. \\(n = 4\\), also Schnittpunkt bei \\((0\\,|\\,4)\\)."
        },
        {
            id: 4, level: 1, typ: "numerisch",
            frage: "Wie groß ist der Anstieg der Geraden \\(f(x) = 4x - 9\\)?",
            loesung: 4, toleranz: 0,
            tipp: "Der Anstieg ist der Faktor vor \\(x\\).",
            loesungsweg: "\\(f(x) = 4x - 9\\) hat den Anstieg \\(m = 4\\)."
        },
        {
            id: 5, level: 1, typ: "numerisch",
            frage: "Wie groß ist der y-Achsenabschnitt der Geraden \\(f(x) = 6x - 11\\)?",
            loesung: -11, toleranz: 0,
            tipp: "Der y-Achsenabschnitt ist das konstante Glied (inkl. Vorzeichen).",
            loesungsweg: "In \\(f(x) = 6x - 11\\) ist \\(n = -11\\)."
        },
        {
            id: 6, level: 1, typ: "mc",
            frage: "Welche Gerade ist eine Parallele zur x-Achse?",
            optionen: ["\\(y = 2x\\)", "\\(y = x + 3\\)", "\\(y = 5\\)", "\\(x = 4\\)"],
            korrekt: 2,
            tipp: "Eine Parallele zur x-Achse hat den Anstieg \\(m = 0\\).",
            loesungsweg: "\\(y = 5\\) bedeutet \\(y = 0 \\cdot x + 5\\), also eine waagerechte Gerade (\\(m = 0\\))."
        },

        // ===== Level 2: Punktprobe und Nullstelle =====
        {
            id: 7, level: 2, typ: "mc",
            frage: "Liegt der Punkt \\(P(2\\,|\\,7)\\) auf der Geraden \\(f(x) = 2x + 3\\)?",
            optionen: ["Ja", "Nein, es ergibt sich \\(5\\)", "Nein, es ergibt sich \\(6\\)", "Nein, es ergibt sich \\(8\\)"],
            korrekt: 0,
            tipp: "Setze den x-Wert in die Gleichung ein und vergleiche mit dem y-Wert.",
            loesungsweg: "\\(f(2) = 2 \\cdot 2 + 3 = 7\\). Der y-Wert stimmt, also liegt \\(P\\) auf der Geraden."
        },
        {
            id: 8, level: 2, typ: "numerisch",
            frage: "Berechne die Nullstelle von \\(f(x) = 2x - 8\\).",
            loesung: 4, toleranz: 0,
            tipp: "Setze \\(f(x) = 0\\) und löse nach \\(x\\) auf.",
            loesungsweg: "\\(2x - 8 = 0 \\Rightarrow 2x = 8 \\Rightarrow x = 4\\)."
        },
        {
            id: 9, level: 2, typ: "numerisch",
            frage: "Berechne die Nullstelle von \\(f(x) = -3x + 12\\).",
            loesung: 4, toleranz: 0,
            tipp: "\\(f(x) = 0\\) setzen.",
            loesungsweg: "\\(-3x + 12 = 0 \\Rightarrow -3x = -12 \\Rightarrow x = 4\\)."
        },
        {
            id: 10, level: 2, typ: "numerisch",
            frage: "Berechne \\(f(5)\\) für \\(f(x) = -2x + 10\\).",
            loesung: 0, toleranz: 0,
            tipp: "Setze \\(x = 5\\) ein.",
            loesungsweg: "\\(f(5) = -2 \\cdot 5 + 10 = -10 + 10 = 0\\)."
        },
        {
            id: 11, level: 2, typ: "numerisch",
            frage: "Berechne die Nullstelle von \\(f(x) = \\frac{1}{2}x - 3\\).",
            loesung: 6, toleranz: 0,
            tipp: "\\(\\frac{1}{2}x - 3 = 0\\).",
            loesungsweg: "\\(\\frac{1}{2}x = 3 \\Rightarrow x = 6\\)."
        },
        {
            id: 12, level: 2, typ: "mc",
            frage: "Welcher Punkt liegt auf der Geraden \\(f(x) = -x + 5\\)?",
            optionen: ["\\(P(2\\,|\\,3)\\)", "\\(P(3\\,|\\,3)\\)", "\\(P(1\\,|\\,6)\\)", "\\(P(-1\\,|\\,4)\\)"],
            korrekt: 0,
            tipp: "Probiere jeden Punkt in die Gleichung einzusetzen.",
            loesungsweg: "\\(f(2) = -2 + 5 = 3\\). Das passt zu \\(P(2\\,|\\,3)\\)."
        },

        // ===== Level 3: Geradengleichung aus zwei Punkten =====
        {
            id: 13, level: 3, typ: "numerisch",
            frage: "Die Gerade verläuft durch \\(A(1\\,|\\,3)\\) und \\(B(4\\,|\\,9)\\). Bestimme den Anstieg \\(m\\).",
            loesung: 2, toleranz: 0,
            tipp: "\\(m = \\frac{y_2 - y_1}{x_2 - x_1}\\).",
            loesungsweg: "\\(m = \\frac{9 - 3}{4 - 1} = \\frac{6}{3} = 2\\)."
        },
        {
            id: 14, level: 3, typ: "numerisch",
            frage: "Die Gerade verläuft durch \\(A(1\\,|\\,3)\\) und \\(B(4\\,|\\,9)\\) mit \\(m = 2\\). Bestimme den y-Achsenabschnitt \\(n\\).",
            loesung: 1, toleranz: 0,
            tipp: "Setze einen Punkt in \\(y = mx + n\\) ein.",
            loesungsweg: "\\(3 = 2 \\cdot 1 + n \\Rightarrow n = 1\\). Also \\(f(x) = 2x + 1\\)."
        },
        {
            id: 15, level: 3, typ: "mc",
            frage: "Welche Gleichung hat die Gerade durch \\(A(0\\,|\\,-2)\\) und \\(B(2\\,|\\,4)\\)?",
            optionen: ["\\(y = 2x - 2\\)", "\\(y = 3x - 2\\)", "\\(y = -3x + 4\\)", "\\(y = 3x + 2\\)"],
            korrekt: 1,
            tipp: "Der Punkt \\((0\\,|\\,-2)\\) liefert sofort \\(n\\).",
            loesungsweg: "\\(n = -2\\) (Schnittpunkt mit y-Achse). \\(m = \\frac{4-(-2)}{2-0} = \\frac{6}{2} = 3\\). Also \\(y = 3x - 2\\)."
        },
        {
            id: 16, level: 3, typ: "numerisch",
            frage: "Eine Gerade hat Anstieg \\(m = -2\\) und verläuft durch \\(P(3\\,|\\,1)\\). Bestimme \\(n\\).",
            loesung: 7, toleranz: 0,
            tipp: "\\(1 = -2 \\cdot 3 + n\\).",
            loesungsweg: "\\(1 = -6 + n \\Rightarrow n = 7\\). Also \\(f(x) = -2x + 7\\)."
        },
        {
            id: 17, level: 3, typ: "numerisch",
            frage: "Bestimme den Anstieg der Geraden durch \\(A(-2\\,|\\,5)\\) und \\(B(2\\,|\\,-3)\\).",
            loesung: -2, toleranz: 0,
            tipp: "\\(m = \\frac{y_2 - y_1}{x_2 - x_1}\\).",
            loesungsweg: "\\(m = \\frac{-3 - 5}{2 - (-2)} = \\frac{-8}{4} = -2\\)."
        },
        {
            id: 18, level: 3, typ: "mc",
            frage: "Welche Gleichung hat die Gerade durch \\(A(-1\\,|\\,2)\\) und \\(B(3\\,|\\,10)\\)?",
            optionen: ["\\(y = 2x + 4\\)", "\\(y = 3x + 1\\)", "\\(y = 2x + 3\\)", "\\(y = x + 3\\)"],
            korrekt: 0,
            tipp: "Erst \\(m\\), dann einen Punkt einsetzen, um \\(n\\) zu finden.",
            loesungsweg: "\\(m = \\frac{10 - 2}{3 - (-1)} = \\frac{8}{4} = 2\\). Mit \\(A\\): \\(2 = 2 \\cdot (-1) + n \\Rightarrow n = 4\\). Also \\(y = 2x + 4\\)."
        },

        // ===== Level 4: Parallelität und Orthogonalität =====
        {
            id: 19, level: 4, typ: "mc",
            frage: "Welche Gerade ist parallel zu \\(f(x) = 3x - 4\\)?",
            optionen: ["\\(g(x) = -3x + 1\\)", "\\(g(x) = 3x + 5\\)", "\\(g(x) = \\frac{1}{3}x - 4\\)", "\\(g(x) = -\\frac{1}{3}x + 2\\)"],
            korrekt: 1,
            tipp: "Parallele Geraden haben denselben Anstieg.",
            loesungsweg: "Parallele Geraden haben gleiches \\(m\\). \\(f\\) hat \\(m = 3\\), also ist \\(g(x) = 3x + 5\\) parallel."
        },
        {
            id: 20, level: 4, typ: "mc",
            frage: "Welche Gerade steht senkrecht auf \\(f(x) = 2x + 1\\)?",
            optionen: ["\\(g(x) = 2x - 1\\)", "\\(g(x) = -2x + 3\\)", "\\(g(x) = -\\frac{1}{2}x + 4\\)", "\\(g(x) = \\frac{1}{2}x - 2\\)"],
            korrekt: 2,
            tipp: "Für senkrechte Geraden gilt \\(m_1 \\cdot m_2 = -1\\).",
            loesungsweg: "Für Orthogonalität: \\(2 \\cdot m_2 = -1 \\Rightarrow m_2 = -\\frac{1}{2}\\). Also \\(g(x) = -\\frac{1}{2}x + 4\\)."
        },
        {
            id: 21, level: 4, typ: "numerisch",
            frage: "Eine Gerade ist parallel zu \\(f(x) = -4x + 3\\) und verläuft durch \\(P(1\\,|\\,2)\\). Wie groß ist \\(n\\)?",
            loesung: 6, toleranz: 0,
            tipp: "Gleicher Anstieg \\(m = -4\\), dann Punktprobe.",
            loesungsweg: "\\(m = -4\\). Mit \\(P(1\\,|\\,2)\\): \\(2 = -4 \\cdot 1 + n \\Rightarrow n = 6\\)."
        },
        {
            id: 22, level: 4, typ: "numerisch",
            frage: "Welchen Anstieg hat eine Gerade, die senkrecht zu \\(f(x) = \\frac{1}{4}x + 5\\) verläuft?",
            loesung: -4, toleranz: 0,
            tipp: "\\(m_1 \\cdot m_2 = -1\\).",
            loesungsweg: "\\(\\frac{1}{4} \\cdot m_2 = -1 \\Rightarrow m_2 = -4\\)."
        },
        {
            id: 23, level: 4, typ: "mc",
            frage: "Sind die Geraden \\(f(x) = \\frac{2}{3}x - 1\\) und \\(g(x) = -\\frac{3}{2}x + 4\\) senkrecht zueinander?",
            optionen: ["Ja, weil \\(m_1 \\cdot m_2 = -1\\)", "Nein, sie sind parallel", "Nein, sie sind identisch", "Nein, das Produkt ist \\(+1\\)"],
            korrekt: 0,
            tipp: "Berechne \\(m_1 \\cdot m_2\\).",
            loesungsweg: "\\(\\frac{2}{3} \\cdot \\left(-\\frac{3}{2}\\right) = -1\\). Also sind sie senkrecht zueinander."
        },
        {
            id: 24, level: 4, typ: "numerisch",
            frage: "Eine Gerade ist senkrecht zu \\(f(x) = 3x - 2\\) und verläuft durch \\(P(6\\,|\\,1)\\). Wie groß ist \\(n\\)?",
            loesung: 3, toleranz: 0,
            tipp: "Erst senkrechten Anstieg bestimmen, dann Punktprobe.",
            loesungsweg: "\\(m_2 = -\\frac{1}{3}\\). Mit \\(P(6\\,|\\,1)\\): \\(1 = -\\frac{1}{3} \\cdot 6 + n = -2 + n \\Rightarrow n = 3\\)."
        },

        // ===== Level 5: Schnittpunkt zweier Geraden =====
        {
            id: 25, level: 5, typ: "numerisch",
            frage: "Bestimme den x-Wert des Schnittpunkts von \\(f(x) = 2x + 1\\) und \\(g(x) = -x + 7\\).",
            loesung: 2, toleranz: 0,
            tipp: "Setze \\(f(x) = g(x)\\) und löse nach \\(x\\).",
            loesungsweg: "\\(2x + 1 = -x + 7 \\Rightarrow 3x = 6 \\Rightarrow x = 2\\)."
        },
        {
            id: 26, level: 5, typ: "numerisch",
            frage: "Bestimme den y-Wert des Schnittpunkts von \\(f(x) = 2x + 1\\) und \\(g(x) = -x + 7\\).",
            loesung: 5, toleranz: 0,
            tipp: "Setze \\(x = 2\\) in eine der Gleichungen ein.",
            loesungsweg: "\\(f(2) = 2 \\cdot 2 + 1 = 5\\). Schnittpunkt: \\(S(2\\,|\\,5)\\)."
        },
        {
            id: 27, level: 5, typ: "numerisch",
            frage: "Bestimme den x-Wert des Schnittpunkts von \\(f(x) = 3x - 4\\) und \\(g(x) = x + 2\\).",
            loesung: 3, toleranz: 0,
            tipp: "\\(3x - 4 = x + 2\\).",
            loesungsweg: "\\(3x - 4 = x + 2 \\Rightarrow 2x = 6 \\Rightarrow x = 3\\)."
        },
        {
            id: 28, level: 5, typ: "mc",
            frage: "Wo schneiden sich \\(f(x) = 0{,}5x + 2\\) und \\(g(x) = -0{,}5x + 4\\)?",
            optionen: ["\\(S(1\\,|\\,2{,}5)\\)", "\\(S(2\\,|\\,3)\\)", "\\(S(3\\,|\\,3{,}5)\\)", "\\(S(4\\,|\\,4)\\)"],
            korrekt: 1,
            tipp: "Setze die Gleichungen gleich.",
            loesungsweg: "\\(0{,}5x + 2 = -0{,}5x + 4 \\Rightarrow x = 2\\). \\(f(2) = 1 + 2 = 3\\). Also \\(S(2\\,|\\,3)\\)."
        },
        {
            id: 29, level: 5, typ: "numerisch",
            frage: "Bestimme den x-Wert des Schnittpunkts von \\(f(x) = -2x + 10\\) und \\(g(x) = x + 1\\).",
            loesung: 3, toleranz: 0,
            tipp: "\\(-2x + 10 = x + 1\\).",
            loesungsweg: "\\(-2x + 10 = x + 1 \\Rightarrow 9 = 3x \\Rightarrow x = 3\\)."
        },
        {
            id: 30, level: 5, typ: "mc",
            frage: "Welche Lage haben \\(f(x) = 2x + 3\\) und \\(g(x) = 2x - 5\\) zueinander?",
            optionen: ["Sie schneiden sich in \\(S(0\\,|\\,3)\\)", "Sie sind identisch", "Sie sind parallel, aber nicht identisch", "Sie stehen senkrecht aufeinander"],
            korrekt: 2,
            tipp: "Gleiches \\(m\\), verschiedene \\(n\\).",
            loesungsweg: "Beide haben \\(m = 2\\) (parallel), aber verschiedene \\(n\\) (\\(3\\) und \\(-5\\)). Also parallel, nicht identisch — kein Schnittpunkt."
        },

        // ===== Level 6: Textaufgaben / Modellierung =====
        {
            id: 31, level: 6, typ: "numerisch",
            frage: "Ein Taxiunternehmen verlangt eine Grundgebühr von \\(3{,}50\\) EUR und \\(1{,}20\\) EUR pro gefahrenen Kilometer. Wie viel kostet eine Fahrt über \\(12\\) km (in EUR)?",
            loesung: 17.9, toleranz: 0.01,
            tipp: "Stelle eine lineare Funktion \\(K(x) = 1{,}20x + 3{,}50\\) auf.",
            loesungsweg: "\\(K(x) = 1{,}20x + 3{,}50\\). \\(K(12) = 1{,}20 \\cdot 12 + 3{,}50 = 14{,}40 + 3{,}50 = 17{,}90\\) EUR."
        },
        {
            id: 32, level: 6, typ: "numerisch",
            frage: "Ein Handy-Tarif kostet \\(8\\) EUR Grundgebühr pro Monat plus \\(0{,}10\\) EUR pro Minute. Wie viele Minuten wurden bei einer Monatsrechnung von \\(20\\) EUR telefoniert?",
            loesung: 120, toleranz: 0,
            tipp: "\\(20 = 0{,}10x + 8\\).",
            loesungsweg: "\\(20 = 0{,}10x + 8 \\Rightarrow 12 = 0{,}10x \\Rightarrow x = 120\\) Minuten."
        },
        {
            id: 33, level: 6, typ: "numerisch",
            frage: "Ein Pool enthält \\(300\\) Liter Wasser. Pro Minute fließen \\(15\\) Liter zu. Wie viele Liter enthält er nach \\(20\\) Minuten?",
            loesung: 600, toleranz: 0,
            tipp: "\\(V(t) = 15t + 300\\).",
            loesungsweg: "\\(V(t) = 15t + 300\\). \\(V(20) = 15 \\cdot 20 + 300 = 300 + 300 = 600\\) Liter."
        },
        {
            id: 34, level: 6, typ: "numerisch",
            frage: "Tarif A: \\(5\\) EUR Grundgebühr + \\(0{,}50\\) EUR/Minute. Tarif B: \\(11\\) EUR Grundgebühr + \\(0{,}20\\) EUR/Minute. Ab wie vielen Minuten ist Tarif B günstiger?",
            loesung: 20, toleranz: 0,
            tipp: "Setze \\(0{,}50x + 5 = 0{,}20x + 11\\) und löse nach \\(x\\).",
            loesungsweg: "\\(0{,}50x + 5 = 0{,}20x + 11 \\Rightarrow 0{,}30x = 6 \\Rightarrow x = 20\\). Ab \\(20\\) Minuten ist Tarif B günstiger."
        },
        {
            id: 35, level: 6, typ: "mc",
            frage: "Eine Kerze ist zu Beginn \\(20\\) cm lang und brennt gleichmäßig mit \\(2\\) cm pro Stunde ab. Welche Funktion beschreibt die Länge \\(L(t)\\) in cm nach \\(t\\) Stunden?",
            optionen: ["\\(L(t) = 2t + 20\\)", "\\(L(t) = -2t + 20\\)", "\\(L(t) = 20t - 2\\)", "\\(L(t) = -20t + 2\\)"],
            korrekt: 1,
            tipp: "Startwert ist \\(n\\). Abnahme bedeutet negatives \\(m\\).",
            loesungsweg: "Startlänge: \\(n = 20\\). Die Kerze wird kürzer, also \\(m = -2\\). Also \\(L(t) = -2t + 20\\)."
        },
        {
            id: 36, level: 6, typ: "numerisch",
            frage: "Ein Auto fährt mit konstanter Geschwindigkeit. Nach \\(2\\) Stunden hat es \\(180\\) km, nach \\(5\\) Stunden \\(405\\) km zurückgelegt. Wie groß ist die Geschwindigkeit in km/h?",
            loesung: 75, toleranz: 0,
            tipp: "Die Geschwindigkeit entspricht dem Anstieg der Geraden.",
            loesungsweg: "\\(m = \\frac{405 - 180}{5 - 2} = \\frac{225}{3} = 75\\) km/h."
        }
    ];
    </script>
    <script src="../spirale-engine.js"></script>
</body>
</html>
