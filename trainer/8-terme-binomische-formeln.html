<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terme &amp; Binomische Formeln - DifferenzierungsEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="../spirale.css">
    <style>:root { --spirale-primary: #667eea; --spirale-secondary: #764ba2; }</style>
</head>
<body>
    <div class="spirale-container" id="app"></div>
    <script>
    const THEMA_KEY = '8-terme-binomische-formeln';
    const THEMA_CONFIG = { name: 'Terme & Binomische Formeln', bereich: 'algebra', p3Enabled: true };
    const AUFGABEN = [
      // ========== LEVEL 1 — Terme zusammenfassen, Koeffizienten erkennen ==========
      {
        id: 1,
        level: 1,
        typ: "mc",
        frage: "Vereinfache \\(3x + 5x\\).",
        optionen: ["\\(15x\\)", "\\(8x\\)", "\\(8x^2\\)", "\\(35x\\)"],
        korrekt: 1,
        tipp: "Addiere die Koeffizienten: \\(3 + 5 = \\,?\\)",
        loesungsweg: "$$3x + 5x = (3+5) \\cdot x = 8x$$"
      },
      {
        id: 2,
        level: 1,
        typ: "numerisch",
        frage: "Vereinfache \\(7a^2 - 2a^2\\). Wie lautet der Koeffizient vor \\(a^2\\)?",
        loesung: 5,
        toleranz: 0,
        tipp: "Subtrahiere die Koeffizienten: \\(7 - 2 = \\,?\\)",
        loesungsweg: "$$7a^2 - 2a^2 = (7-2) \\cdot a^2 = 5a^2 \\quad \\Rightarrow \\text{Koeffizient} = 5$$"
      },
      {
        id: 3,
        level: 1,
        typ: "mc",
        frage: "Welcher Term ist gleichwertig zu \\(4y + 3y - 2y\\)?",
        optionen: ["\\(9y\\)", "\\(5y\\)", "\\(24y\\)", "\\(5y^2\\)"],
        korrekt: 1,
        tipp: "Rechne Schritt für Schritt: \\(4 + 3 - 2 = \\,?\\)",
        loesungsweg: "$$4y + 3y - 2y = (4 + 3 - 2) \\cdot y = 5y$$"
      },
      {
        id: 4,
        level: 1,
        typ: "numerisch",
        frage: "Vereinfache \\(8b + 2b - 4b + b\\). Wie lautet der Koeffizient vor \\(b\\)?",
        loesung: 7,
        toleranz: 0,
        tipp: "Denke daran: \\(b = 1 \\cdot b\\). Also \\(8 + 2 - 4 + 1 = \\,?\\)",
        loesungsweg: "$$8b + 2b - 4b + b = (8 + 2 - 4 + 1) \\cdot b = 7b$$"
      },
      {
        id: 5,
        level: 1,
        typ: "mc",
        frage: "Vereinfache \\(6x^2 + 3x - 2x^2 + x\\). Welcher Term entsteht?",
        optionen: ["\\(4x^2 + 4x\\)", "\\(8x^2 + 4x\\)", "\\(4x^2 + 2x\\)", "\\(8x^3\\)"],
        korrekt: 0,
        tipp: "Fasse \\(x^2\\)-Terme und \\(x\\)-Terme getrennt zusammen.",
        loesungsweg: "$$6x^2 + 3x - 2x^2 + x = (6-2)x^2 + (3+1)x = 4x^2 + 4x$$"
      },
      {
        id: 6,
        level: 1,
        typ: "numerisch",
        frage: "Im Term \\(5a + 3b - 2a + 7b\\): Wie lautet der Koeffizient vor \\(b\\) nach dem Vereinfachen?",
        loesung: 10,
        toleranz: 0,
        tipp: "Fasse die \\(b\\)-Terme zusammen: \\(3 + 7 = \\,?\\)",
        loesungsweg: "$$5a + 3b - 2a + 7b = 3a + 10b \\quad \\Rightarrow \\text{Koeffizient vor } b = 10$$"
      },
      // ========== LEVEL 2 — Ausmultiplizieren und Ausklammern ==========
      {
        id: 7,
        level: 2,
        typ: "mc",
        frage: "Multipliziere aus: \\(3(2x + 4)\\).",
        optionen: ["\\(6x + 4\\)", "\\(6x + 12\\)", "\\(5x + 7\\)", "\\(6x + 7\\)"],
        korrekt: 1,
        tipp: "Multipliziere \\(3\\) mit jedem Summanden: \\(3 \\cdot 2x\\) und \\(3 \\cdot 4\\).",
        loesungsweg: "$$3(2x + 4) = 3 \\cdot 2x + 3 \\cdot 4 = 6x + 12$$"
      },
      {
        id: 8,
        level: 2,
        typ: "numerisch",
        frage: "Multipliziere aus: \\(-4(3a - 2)\\). Wie lautet das absolute Glied (Zahl ohne Variable)?",
        loesung: 8,
        toleranz: 0,
        tipp: "Beachte: \\(-4 \\cdot (-2) = \\,?\\)",
        loesungsweg: "$$-4(3a - 2) = -12a + 8 \\quad \\Rightarrow \\text{absolutes Glied} = 8$$"
      },
      {
        id: 9,
        level: 2,
        typ: "mc",
        frage: "Klammere aus: \\(6x^2 + 9x\\).",
        optionen: ["\\(6x(x + 9)\\)", "\\(3x(2x + 3)\\)", "\\(9x(x + 1)\\)", "\\(3(2x^2 + 3)\\)"],
        korrekt: 1,
        tipp: "Der GGT von \\(6x^2\\) und \\(9x\\) ist \\(3x\\).",
        loesungsweg: "$$6x^2 + 9x = 3x \\cdot 2x + 3x \\cdot 3 = 3x(2x + 3)$$"
      },
      {
        id: 10,
        level: 2,
        typ: "numerisch",
        frage: "Vereinfache \\(5(x + 3) - 2(x - 1)\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 3,
        toleranz: 0,
        tipp: "Erst ausmultiplizieren: \\(5x + 15 - 2x + 2\\). Dann \\(x\\)-Terme zusammenfassen.",
        loesungsweg: "$$5(x + 3) - 2(x - 1) = 5x + 15 - 2x + 2 = 3x + 17 \\quad \\Rightarrow \\text{Koeffizient vor } x = 3$$"
      },
      {
        id: 11,
        level: 2,
        typ: "mc",
        frage: "Klammere aus: \\(12a^2 - 8a\\).",
        optionen: ["\\(4a(3a - 2)\\)", "\\(4(3a^2 - 2a)\\)", "\\(2a(6a - 4)\\)", "\\(8a(a - 1)\\)"],
        korrekt: 0,
        tipp: "\\(\\text{GGT}(12, 8) = 4\\). Beide Terme enthalten \\(a\\). Also ist \\(4a\\) der gemeinsame Faktor.",
        loesungsweg: "$$12a^2 - 8a = 4a \\cdot 3a - 4a \\cdot 2 = 4a(3a - 2)$$"
      },
      {
        id: 12,
        level: 2,
        typ: "numerisch",
        frage: "Vereinfache \\(2x(3x + 1) - x(4x - 5)\\). Wie lautet der Koeffizient vor \\(x^2\\)?",
        loesung: 2,
        toleranz: 0,
        tipp: "Erst ausmultiplizieren: \\(6x^2 + 2x - 4x^2 + 5x\\). Dann \\(x^2\\)-Terme zusammenfassen.",
        loesungsweg: "$$2x(3x + 1) - x(4x - 5) = 6x^2 + 2x - 4x^2 + 5x = 2x^2 + 7x \\quad \\Rightarrow \\text{Koeffizient vor } x^2 = 2$$"
      },
      // ========== LEVEL 3 — 1. und 2. Binomische Formel ==========
      {
        id: 13,
        level: 3,
        typ: "mc",
        frage: "Wende die 1. binomische Formel an: \\((x + 3)^2\\).",
        optionen: ["\\(x^2 + 9\\)", "\\(x^2 + 3x + 9\\)", "\\(x^2 + 6x + 9\\)", "\\(2x + 6\\)"],
        korrekt: 2,
        tipp: "1. binomische Formel: \\((a+b)^2 = a^2 + 2ab + b^2\\). Hier ist \\(a = x\\) und \\(b = 3\\).",
        loesungsweg: "$$\\begin{aligned}(x + 3)^2 &= x^2 + 2 \\cdot x \\cdot 3 + 3^2 \\\\ &= x^2 + 6x + 9\\end{aligned}$$"
      },
      {
        id: 14,
        level: 3,
        typ: "numerisch",
        frage: "Berechne \\((a - 4)^2\\) mit der 2. binomischen Formel. Wie lautet das absolute Glied?",
        loesung: 16,
        toleranz: 0,
        tipp: "2. binomische Formel: \\((a-b)^2 = a^2 - 2ab + b^2\\). Hier ist \\(b = 4\\), also \\(b^2 = \\,?\\)",
        loesungsweg: "$$\\begin{aligned}(a - 4)^2 &= a^2 - 2 \\cdot a \\cdot 4 + 4^2 \\\\ &= a^2 - 8a + 16\\end{aligned}$$ Das absolute Glied ist \\(16\\)."
      },
      {
        id: 15,
        level: 3,
        typ: "mc",
        frage: "Welche binomische Formel steckt in \\(x^2 + 10x + 25\\)?",
        optionen: ["\\((x + 5)^2\\)", "\\((x - 5)^2\\)", "\\((x + 25)^2\\)", "\\((x + 5)(x - 5)\\)"],
        korrekt: 0,
        tipp: "Prüfe: \\(\\sqrt{25} = 5\\) und \\(2 \\cdot x \\cdot 5 = 10x\\). Passt das zur 1. oder 2. Formel?",
        loesungsweg: "$$x^2 + 10x + 25 = x^2 + 2 \\cdot x \\cdot 5 + 5^2 = (x + 5)^2 \\quad \\text{(1. binomische Formel)}$$"
      },
      {
        id: 16,
        level: 3,
        typ: "numerisch",
        frage: "Berechne \\((2x + 1)^2\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 4,
        toleranz: 0,
        tipp: "\\((2x + 1)^2 = (2x)^2 + 2 \\cdot 2x \\cdot 1 + 1^2\\). Was ist \\(2 \\cdot 2x \\cdot 1\\)?",
        loesungsweg: "$$\\begin{aligned}(2x + 1)^2 &= 4x^2 + 2 \\cdot 2x \\cdot 1 + 1 \\\\ &= 4x^2 + 4x + 1\\end{aligned}$$ Koeffizient vor \\(x = 4\\)."
      },
      {
        id: 17,
        level: 3,
        typ: "mc",
        frage: "Wende die 2. binomische Formel an: \\((3a - 2)^2\\).",
        optionen: ["\\(9a^2 - 4\\)", "\\(9a^2 - 6a + 4\\)", "\\(9a^2 - 12a + 4\\)", "\\(9a^2 + 12a + 4\\)"],
        korrekt: 2,
        tipp: "\\((3a)^2 = 9a^2\\), \\(2 \\cdot 3a \\cdot 2 = 12a\\), \\(2^2 = 4\\). Beachte das Minuszeichen!",
        loesungsweg: "$$\\begin{aligned}(3a - 2)^2 &= (3a)^2 - 2 \\cdot 3a \\cdot 2 + 2^2 \\\\ &= 9a^2 - 12a + 4\\end{aligned}$$"
      },
      {
        id: 18,
        level: 3,
        typ: "numerisch",
        frage: "Berechne \\(31^2\\) mithilfe der 1. binomischen Formel: \\(31^2 = (30 + 1)^2\\).",
        loesung: 961,
        toleranz: 0,
        tipp: "\\((30 + 1)^2 = 30^2 + 2 \\cdot 30 \\cdot 1 + 1^2 = 900 + 60 + 1\\).",
        loesungsweg: "$$31^2 = (30 + 1)^2 = 900 + 60 + 1 = 961$$"
      },
      // ========== LEVEL 4 — 3. Binomische Formel ==========
      {
        id: 19,
        level: 4,
        typ: "mc",
        frage: "Wende die 3. binomische Formel an: \\((x + 5)(x - 5)\\).",
        optionen: ["\\(x^2 - 10x + 25\\)", "\\(x^2 + 25\\)", "\\(x^2 - 25\\)", "\\(x^2 - 10\\)"],
        korrekt: 2,
        tipp: "3. binomische Formel: \\((a+b)(a-b) = a^2 - b^2\\). Hier ist \\(b = 5\\).",
        loesungsweg: "$$(x + 5)(x - 5) = x^2 - 5^2 = x^2 - 25$$"
      },
      {
        id: 20,
        level: 4,
        typ: "numerisch",
        frage: "Berechne \\(49 \\cdot 51\\) mithilfe der 3. binomischen Formel: \\((50 - 1)(50 + 1)\\).",
        loesung: 2499,
        toleranz: 0,
        tipp: "\\((50 - 1)(50 + 1) = 50^2 - 1^2 = 2500 - 1\\).",
        loesungsweg: "$$49 \\cdot 51 = (50 - 1)(50 + 1) = 50^2 - 1^2 = 2500 - 1 = 2499$$"
      },
      {
        id: 21,
        level: 4,
        typ: "mc",
        frage: "Faktorisiere \\(x^2 - 9\\).",
        optionen: ["\\((x - 3)^2\\)", "\\((x + 9)(x - 9)\\)", "\\((x + 3)(x - 3)\\)", "\\((x - 3)(x - 3)\\)"],
        korrekt: 2,
        tipp: "\\(9 = 3^2\\). Erkenne die 3. binomische Formel rueckwaerts: \\(a^2 - b^2 = (a+b)(a-b)\\).",
        loesungsweg: "$$x^2 - 9 = x^2 - 3^2 = (x + 3)(x - 3)$$"
      },
      {
        id: 22,
        level: 4,
        typ: "numerisch",
        frage: "Berechne \\((2x + 3)(2x - 3)\\). Wie lautet das absolute Glied?",
        loesung: -9,
        toleranz: 0,
        tipp: "3. binomische Formel: \\((2x)^2 - 3^2\\). Was ist \\(-3^2\\)?",
        loesungsweg: "$$(2x + 3)(2x - 3) = (2x)^2 - 3^2 = 4x^2 - 9 \\quad \\Rightarrow \\text{absolutes Glied} = -9$$"
      },
      {
        id: 23,
        level: 4,
        typ: "mc",
        frage: "Faktorisiere \\(4a^2 - 49\\).",
        optionen: ["\\((2a + 7)(2a - 7)\\)", "\\((4a + 49)(4a - 49)\\)", "\\((2a - 7)^2\\)", "\\((a + 7)(a - 7)\\)"],
        korrekt: 0,
        tipp: "\\(4a^2 = (2a)^2\\) und \\(49 = 7^2\\). Wende die 3. binomische Formel rueckwaerts an.",
        loesungsweg: "$$4a^2 - 49 = (2a)^2 - 7^2 = (2a + 7)(2a - 7)$$"
      },
      {
        id: 24,
        level: 4,
        typ: "numerisch",
        frage: "Faktorisiere \\(25x^2 - 16\\). Wie lautet die Summe der beiden konstanten Terme in den Klammern?",
        loesung: 0,
        toleranz: 0,
        tipp: "\\(25x^2 - 16 = (5x + 4)(5x - 4)\\). Die Konstanten sind \\(+4\\) und \\(-4\\).",
        loesungsweg: "$$25x^2 - 16 = (5x)^2 - 4^2 = (5x + 4)(5x - 4)$$ Die Summe der Konstanten: \\(4 + (-4) = 0\\)."
      },
      // ========== LEVEL 5 — Gemischte binomische Formeln ==========
      {
        id: 25,
        level: 5,
        typ: "mc",
        frage: "Welche binomische Formel passt zu \\(9x^2 - 30x + 25\\)?",
        optionen: ["\\((3x + 5)^2\\)", "\\((3x - 5)^2\\)", "\\((9x - 5)(x - 5)\\)", "\\((3x + 5)(3x - 5)\\)"],
        korrekt: 1,
        tipp: "\\(9x^2 = (3x)^2\\), \\(25 = 5^2\\), \\(30x = 2 \\cdot 3x \\cdot 5\\). Ist das Vorzeichen des mittleren Terms negativ?",
        loesungsweg: "$$9x^2 - 30x + 25 = (3x)^2 - 2 \\cdot 3x \\cdot 5 + 5^2 = (3x - 5)^2$$"
      },
      {
        id: 26,
        level: 5,
        typ: "numerisch",
        frage: "Vereinfache \\((x + 4)^2 - (x - 4)^2\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 16,
        toleranz: 0,
        tipp: "Berechne beide Quadrate einzeln und subtrahiere. Oder erkenne: \\(a^2 - b^2 = (a+b)(a-b)\\) mit \\(a = (x+4)\\) und \\(b = (x-4)\\).",
        loesungsweg: "$$\\begin{aligned}(x+4)^2 - (x-4)^2 &= (x^2 + 8x + 16) - (x^2 - 8x + 16) \\\\ &= x^2 + 8x + 16 - x^2 + 8x - 16 = 16x\\end{aligned}$$ Koeffizient vor \\(x = 16\\)."
      },
      {
        id: 27,
        level: 5,
        typ: "mc",
        frage: "Faktorisiere vollständig: \\(2x^2 - 50\\).",
        optionen: ["\\(2(x + 5)(x - 5)\\)", "\\(2(x^2 - 25)\\)", "\\((2x + 10)(x - 5)\\)", "\\(2(x - 5)^2\\)"],
        korrekt: 0,
        tipp: "Klammere erst \\(2\\) aus: \\(2(x^2 - 25)\\). Dann wende die 3. binomische Formel an.",
        loesungsweg: "$$2x^2 - 50 = 2(x^2 - 25) = 2(x^2 - 5^2) = 2(x + 5)(x - 5)$$"
      },
      {
        id: 28,
        level: 5,
        typ: "numerisch",
        frage: "Vereinfache \\((a + 3)^2 + (a - 3)^2\\). Wie lautet der Koeffizient vor \\(a^2\\)?",
        loesung: 2,
        toleranz: 0,
        tipp: "Berechne beide Quadrate: \\(a^2 + 6a + 9\\) und \\(a^2 - 6a + 9\\). Was passiert beim Addieren?",
        loesungsweg: "$$\\begin{aligned}(a+3)^2 + (a-3)^2 &= (a^2 + 6a + 9) + (a^2 - 6a + 9) \\\\ &= 2a^2 + 18\\end{aligned}$$ Koeffizient vor \\(a^2 = 2\\)."
      },
      {
        id: 29,
        level: 5,
        typ: "mc",
        frage: "Welcher Ausdruck ist gleichwertig zu \\(x^2 + 14x + 49\\)?",
        optionen: ["\\((x + 14)^2\\)", "\\((x + 7)^2\\)", "\\((x - 7)^2\\)", "\\((x + 7)(x - 7)\\)"],
        korrekt: 1,
        tipp: "Prüfe: \\(49 = 7^2\\) und \\(14x = 2 \\cdot x \\cdot 7\\). Welche Formel ist das?",
        loesungsweg: "$$x^2 + 14x + 49 = x^2 + 2 \\cdot x \\cdot 7 + 7^2 = (x + 7)^2$$"
      },
      {
        id: 30,
        level: 5,
        typ: "numerisch",
        frage: "Berechne \\(97^2\\) mithilfe der 2. binomischen Formel: \\((100 - 3)^2\\).",
        loesung: 9409,
        toleranz: 0,
        tipp: "\\((100 - 3)^2 = 100^2 - 2 \\cdot 100 \\cdot 3 + 3^2 = 10000 - 600 + 9\\).",
        loesungsweg: "$$97^2 = (100 - 3)^2 = 10000 - 600 + 9 = 9409$$"
      },
      // ========== LEVEL 6 — Komplexe Termumformungen ==========
      {
        id: 31,
        level: 6,
        typ: "mc",
        frage: "Multipliziere aus: \\((x + 2)(3x - 5)\\).",
        optionen: ["\\(3x^2 + x - 10\\)", "\\(3x^2 - x - 10\\)", "\\(3x^2 + x + 10\\)", "\\(3x^2 + 11x - 10\\)"],
        korrekt: 0,
        tipp: "Verwende die FOIL-Methode: \\(x \\cdot 3x\\), \\(x \\cdot (-5)\\), \\(2 \\cdot 3x\\), \\(2 \\cdot (-5)\\).",
        loesungsweg: "$$\\begin{aligned}(x + 2)(3x - 5) &= 3x^2 - 5x + 6x - 10 \\\\ &= 3x^2 + x - 10\\end{aligned}$$"
      },
      {
        id: 32,
        level: 6,
        typ: "numerisch",
        frage: "Vereinfache \\((x + 1)^2 + (x + 2)^2\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 6,
        toleranz: 0,
        tipp: "\\((x+1)^2 = x^2 + 2x + 1\\) und \\((x+2)^2 = x^2 + 4x + 4\\). Addiere die \\(x\\)-Terme.",
        loesungsweg: "$$\\begin{aligned}(x+1)^2 + (x+2)^2 &= (x^2 + 2x + 1) + (x^2 + 4x + 4) \\\\ &= 2x^2 + 6x + 5\\end{aligned}$$ Koeffizient vor \\(x = 6\\)."
      },
      {
        id: 33,
        level: 6,
        typ: "mc",
        frage: "Ein Quadrat hat die Seitenlänge \\((x + 3)\\). Ein zweites Quadrat hat die Seitenlänge \\((x - 3)\\). Wie groß ist der Flächenunterschied?",
        optionen: ["\\(12x\\)", "\\(6x\\)", "\\(18\\)", "\\(9\\)"],
        korrekt: 0,
        tipp: "Flächenunterschied: \\((x+3)^2 - (x-3)^2\\). Nutze die 3. binomische Formel als Trick!",
        loesungsweg: "$$\\begin{aligned}(x+3)^2 - (x-3)^2 &= [(x+3) + (x-3)] \\cdot [(x+3) - (x-3)] \\\\ &= 2x \\cdot 6 = 12x\\end{aligned}$$"
      },
      {
        id: 34,
        level: 6,
        typ: "numerisch",
        frage: "Vereinfache \\((2a + b)^2 - 4a^2\\). Wie lautet der Koeffizient vor \\(ab\\)?",
        loesung: 4,
        toleranz: 0,
        tipp: "\\((2a + b)^2 = 4a^2 + 4ab + b^2\\). Was bleibt nach Subtraktion von \\(4a^2\\)?",
        loesungsweg: "$$\\begin{aligned}(2a + b)^2 - 4a^2 &= 4a^2 + 4ab + b^2 - 4a^2 \\\\ &= 4ab + b^2\\end{aligned}$$ Koeffizient vor \\(ab = 4\\)."
      },
      {
        id: 35,
        level: 6,
        typ: "mc",
        frage: "Vereinfache \\((x + 1)(x - 1)(x^2 + 1)\\).",
        optionen: ["\\(x^4 + 1\\)", "\\(x^4 - 1\\)", "\\(x^4 - 2x^2 + 1\\)", "\\(x^4 + 2x^2 - 1\\)"],
        korrekt: 1,
        tipp: "Erst \\((x+1)(x-1) = x^2 - 1\\). Dann wende nochmals die 3. binomische Formel an: \\((x^2 - 1)(x^2 + 1)\\).",
        loesungsweg: "$$\\begin{aligned}(x+1)(x-1)(x^2+1) &= (x^2 - 1)(x^2 + 1) \\\\ &= x^4 - 1\\end{aligned}$$"
      },
      {
        id: 36,
        level: 6,
        typ: "numerisch",
        frage: "Ein Grundstück hat die Masse \\((2x + 5)\\) m und \\((2x - 5)\\) m. Ein quadratisches Grundstück hat die Seitenlänge \\(2x\\) m. Um wie viel \\(\\text{m}^2\\) ist das quadratische Grundstück größer?",
        loesung: 25,
        toleranz: 0,
        tipp: "Rechteck: \\((2x+5)(2x-5) = 4x^2 - 25\\). Quadrat: \\((2x)^2 = 4x^2\\). Differenz?",
        loesungsweg: "$$\\begin{aligned}\\text{Quadrat} - \\text{Rechteck} &= (2x)^2 - (2x+5)(2x-5) \\\\ &= 4x^2 - (4x^2 - 25) = 25\\end{aligned}$$ Das Quadrat ist \\(25\\,\\text{m}^2\\) größer."
      }
    ];
    </script>
    <script src="../p3-reflexion.js"></script>

</body>
