<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logarithmusfunktionen - DifferenzierungsEngine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="../spirale.css">
    <style>:root { --spirale-primary: #667eea; --spirale-secondary: #764ba2; }</style>
</head>
<body>
    <div class="spirale-container" id="app"></div>
    <script>
    const THEMA_KEY = '10-log-funktionen';
    const THEMA_CONFIG = { name: 'Logarithmusfunktionen', bereich: 'analysis' };
    const AUFGABEN = [

    // ═══════════════════════════════════════════════════════════════
    // Level 1: Logarithmus direkt berechnen
    // ═══════════════════════════════════════════════════════════════

    {
        "id": 1, "level": 1, "typ": "mc",
        "frage": "Berechne \\(\\log_2(8)\\).",
        "optionen": ["\\(2\\)", "\\(3\\)", "\\(4\\)", "\\(8\\)"],
        "korrekt": 1,
        "tipp": "Frage dich: \\(2\\) hoch wie viel ergibt \\(8\\)?",
        "loesungsweg": "Es gilt \\(2^3 = 8\\), also ist \\(\\log_2(8) = 3\\)."
    },
    {
        "id": 2, "level": 1, "typ": "mc",
        "frage": "Berechne \\(\\log_{10}(100)\\).",
        "optionen": ["\\(1\\)", "\\(2\\)", "\\(10\\)", "\\(100\\)"],
        "korrekt": 1,
        "tipp": "\\(10\\) hoch wie viel ergibt \\(100\\)?",
        "loesungsweg": "\\(10^2 = 100\\), also \\(\\log_{10}(100) = \\lg(100) = 2\\)."
    },
    {
        "id": 3, "level": 1, "typ": "mc",
        "frage": "Berechne \\(\\log_3(27)\\).",
        "optionen": ["\\(2\\)", "\\(3\\)", "\\(9\\)", "\\(27\\)"],
        "korrekt": 1,
        "tipp": "\\(3\\) hoch wie viel ergibt \\(27\\)?",
        "loesungsweg": "\\(3^3 = 27\\), also \\(\\log_3(27) = 3\\)."
    },
    {
        "id": 4, "level": 1, "typ": "numerisch",
        "frage": "Berechne \\(\\log_2(16)\\).",
        "loesung": 4,
        "toleranz": 0,
        "tipp": "Potenzen von \\(2\\): \\(2, 4, 8, 16, \\ldots\\)",
        "loesungsweg": "\\(2^4 = 16\\), also \\(\\log_2(16) = 4\\)."
    },
    {
        "id": 5, "level": 1, "typ": "mc",
        "frage": "Berechne \\(\\log_5(25)\\).",
        "optionen": ["\\(1\\)", "\\(2\\)", "\\(5\\)", "\\(25\\)"],
        "korrekt": 1,
        "tipp": "\\(5\\) hoch wie viel ergibt \\(25\\)?",
        "loesungsweg": "\\(5^2 = 25\\), also \\(\\log_5(25) = 2\\)."
    },
    {
        "id": 6, "level": 1, "typ": "numerisch",
        "frage": "Berechne \\(\\lg(1000)\\). (Erinnerung: \\(\\lg = \\log_{10}\\))",
        "loesung": 3,
        "toleranz": 0,
        "tipp": "Wie oft muss man \\(10\\) mit sich selbst multiplizieren, um \\(1000\\) zu erhalten?",
        "loesungsweg": "\\(10^3 = 1000\\), also \\(\\lg(1000) = 3\\)."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 2: Definition log_b(x) = y ⇔ b^y = x, Definitionsbereich
    // ═══════════════════════════════════════════════════════════════

    {
        "id": 7, "level": 2, "typ": "mc",
        "frage": "Welche Aussage ist äquivalent zu \\(\\log_b(x) = y\\)?",
        "optionen": ["\\(x^b = y\\)", "\\(b^y = x\\)", "\\(y^x = b\\)", "\\(b \\cdot y = x\\)"],
        "korrekt": 1,
        "tipp": "Der Logarithmus ist die Umkehrfunktion der Exponentialfunktion.",
        "loesungsweg": "Definition: \\(\\log_b(x) = y \\Leftrightarrow b^y = x\\). Man sucht den Exponenten, mit dem man \\(b\\) potenzieren muss, um \\(x\\) zu erhalten."
    },
    {
        "id": 8, "level": 2, "typ": "mc",
        "frage": "Was ist der Definitionsbereich der Funktion \\(f(x) = \\log_2(x)\\)?",
        "optionen": ["\\(\\mathbb{R}\\)", "\\(x > 0\\)", "\\(x \\geq 0\\)", "\\(x \\neq 0\\)"],
        "korrekt": 1,
        "tipp": "Logarithmen sind nur für positive Argumente definiert.",
        "loesungsweg": "Der Logarithmus \\(\\log_b(x)\\) ist nur für \\(x > 0\\) definiert. Also \\(D = (0, \\infty)\\)."
    },
    {
        "id": 9, "level": 2, "typ": "mc",
        "frage": "Welcher Wert ist \\(\\log_b(1)\\) für jede Basis \\(b > 0\\), \\(b \\neq 1\\)?",
        "optionen": ["\\(0\\)", "\\(1\\)", "\\(b\\)", "undefiniert"],
        "korrekt": 0,
        "tipp": "\\(b\\) hoch wie viel ergibt \\(1\\)?",
        "loesungsweg": "Für jede Basis \\(b\\) gilt \\(b^0 = 1\\), also \\(\\log_b(1) = 0\\)."
    },
    {
        "id": 10, "level": 2, "typ": "mc",
        "frage": "Was ist \\(\\ln(e)\\)?",
        "optionen": ["\\(0\\)", "\\(1\\)", "\\(e\\)", "undefiniert"],
        "korrekt": 1,
        "tipp": "\\(\\ln\\) ist der Logarithmus zur Basis \\(e\\).",
        "loesungsweg": "\\(\\ln(e) = \\log_e(e) = 1\\), denn \\(e^1 = e\\)."
    },
    {
        "id": 11, "level": 2, "typ": "numerisch",
        "frage": "Schreibe \\(2^5 = 32\\) als Logarithmus und gib \\(\\log_2(32)\\) an.",
        "loesung": 5,
        "toleranz": 0,
        "tipp": "\\(b^y = x \\Leftrightarrow \\log_b(x) = y\\).",
        "loesungsweg": "Aus \\(2^5 = 32\\) folgt \\(\\log_2(32) = 5\\)."
    },
    {
        "id": 12, "level": 2, "typ": "mc",
        "frage": "Welche Gleichung ist äquivalent zu \\(\\log_3(81) = 4\\)?",
        "optionen": ["\\(3^{81} = 4\\)", "\\(4^3 = 81\\)", "\\(3^4 = 81\\)", "\\(81^4 = 3\\)"],
        "korrekt": 2,
        "tipp": "\\(\\log_b(x) = y \\Leftrightarrow b^y = x\\).",
        "loesungsweg": "\\(\\log_3(81) = 4\\) bedeutet \\(3^4 = 81\\). Probe: \\(3 \\cdot 3 \\cdot 3 \\cdot 3 = 81\\) ✓"
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 3: Logarithmusgesetze
    // ═══════════════════════════════════════════════════════════════

    {
        "id": 13, "level": 3, "typ": "mc",
        "frage": "Welche Formel ist korrekt?",
        "optionen": [
            "\\(\\log(a \\cdot b) = \\log(a) \\cdot \\log(b)\\)",
            "\\(\\log(a \\cdot b) = \\log(a) + \\log(b)\\)",
            "\\(\\log(a + b) = \\log(a) + \\log(b)\\)",
            "\\(\\log(a \\cdot b) = \\log(a) - \\log(b)\\)"
        ],
        "korrekt": 1,
        "tipp": "Produkte im Argument werden zu Summen der Logarithmen.",
        "loesungsweg": "Das Produktgesetz: \\(\\log(a \\cdot b) = \\log(a) + \\log(b)\\)."
    },
    {
        "id": 14, "level": 3, "typ": "numerisch",
        "frage": "Vereinfache \\(\\log_2(4) + \\log_2(8)\\).",
        "loesung": 5,
        "toleranz": 0,
        "tipp": "Nutze \\(\\log(a) + \\log(b) = \\log(a \\cdot b)\\) oder berechne beide Werte einzeln.",
        "loesungsweg": "\\(\\log_2(4) + \\log_2(8) = \\log_2(4 \\cdot 8) = \\log_2(32) = 5\\). Alternativ: \\(2 + 3 = 5\\)."
    },
    {
        "id": 15, "level": 3, "typ": "numerisch",
        "frage": "Berechne \\(\\log_3(27) - \\log_3(3)\\).",
        "loesung": 2,
        "toleranz": 0,
        "tipp": "\\(\\log(a) - \\log(b) = \\log\\left(\\frac{a}{b}\\right)\\).",
        "loesungsweg": "\\(\\log_3(27) - \\log_3(3) = \\log_3\\left(\\frac{27}{3}\\right) = \\log_3(9) = 2\\). Alternativ: \\(3 - 1 = 2\\)."
    },
    {
        "id": 16, "level": 3, "typ": "numerisch",
        "frage": "Berechne \\(\\log_2(4^5)\\) mit Hilfe des Potenzgesetzes.",
        "loesung": 10,
        "toleranz": 0,
        "tipp": "\\(\\log(a^n) = n \\cdot \\log(a)\\).",
        "loesungsweg": "\\(\\log_2(4^5) = 5 \\cdot \\log_2(4) = 5 \\cdot 2 = 10\\)."
    },
    {
        "id": 17, "level": 3, "typ": "mc",
        "frage": "Vereinfache \\(\\lg(20) + \\lg(5)\\).",
        "optionen": ["\\(\\lg(25)\\)", "\\(\\lg(100) = 2\\)", "\\(\\lg(4) \\approx 0{,}6\\)", "\\(25\\)"],
        "korrekt": 1,
        "tipp": "Produktgesetz: \\(\\lg(a) + \\lg(b) = \\lg(a \\cdot b)\\).",
        "loesungsweg": "\\(\\lg(20) + \\lg(5) = \\lg(20 \\cdot 5) = \\lg(100) = 2\\)."
    },
    {
        "id": 18, "level": 3, "typ": "numerisch",
        "frage": "Berechne \\(\\log_2(16) - \\log_2(2) + \\log_2(4)\\).",
        "loesung": 5,
        "toleranz": 0,
        "tipp": "Berechne jeden Logarithmus einzeln und addiere/subtrahiere.",
        "loesungsweg": "\\(\\log_2(16) = 4\\), \\(\\log_2(2) = 1\\), \\(\\log_2(4) = 2\\). Ergebnis: \\(4 - 1 + 2 = 5\\)."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 4: Einfache Logarithmusgleichungen
    // ═══════════════════════════════════════════════════════════════

    {
        "id": 19, "level": 4, "typ": "numerisch",
        "frage": "Löse die Gleichung \\(\\log_2(x) = 3\\).",
        "loesung": 8,
        "toleranz": 0,
        "tipp": "Wandle die Gleichung in die Form \\(b^y = x\\) um.",
        "loesungsweg": "\\(\\log_2(x) = 3 \\Leftrightarrow x = 2^3 = 8\\)."
    },
    {
        "id": 20, "level": 4, "typ": "numerisch",
        "frage": "Löse die Gleichung \\(\\log_3(x) = 4\\).",
        "loesung": 81,
        "toleranz": 0,
        "tipp": "\\(\\log_b(x) = y \\Leftrightarrow x = b^y\\).",
        "loesungsweg": "\\(\\log_3(x) = 4 \\Leftrightarrow x = 3^4 = 81\\)."
    },
    {
        "id": 21, "level": 4, "typ": "numerisch",
        "frage": "Löse die Gleichung \\(\\lg(x) = 2\\).",
        "loesung": 100,
        "toleranz": 0,
        "tipp": "\\(\\lg\\) ist der Logarithmus zur Basis \\(10\\).",
        "loesungsweg": "\\(\\lg(x) = 2 \\Leftrightarrow x = 10^2 = 100\\)."
    },
    {
        "id": 22, "level": 4, "typ": "numerisch",
        "frage": "Löse \\(\\log_3(x^2) = 4\\) für \\(x > 0\\).",
        "loesung": 9,
        "toleranz": 0,
        "tipp": "Entweder Potenzgesetz nutzen oder direkt umwandeln: \\(x^2 = 3^4\\).",
        "loesungsweg": "\\(\\log_3(x^2) = 4 \\Leftrightarrow x^2 = 3^4 = 81 \\Leftrightarrow x = 9\\) (da \\(x > 0\\))."
    },
    {
        "id": 23, "level": 4, "typ": "numerisch",
        "frage": "Löse \\(\\log_2(x) + \\log_2(4) = 5\\).",
        "loesung": 8,
        "toleranz": 0,
        "tipp": "Zuerst \\(\\log_2(4) = 2\\) berechnen, dann umformen.",
        "loesungsweg": "\\(\\log_2(x) + 2 = 5 \\Leftrightarrow \\log_2(x) = 3 \\Leftrightarrow x = 2^3 = 8\\)."
    },
    {
        "id": 24, "level": 4, "typ": "mc",
        "frage": "Löse \\(\\log_5(x) = 3\\).",
        "optionen": ["\\(x = 15\\)", "\\(x = 25\\)", "\\(x = 125\\)", "\\(x = 243\\)"],
        "korrekt": 2,
        "tipp": "\\(\\log_b(x) = y \\Leftrightarrow x = b^y\\).",
        "loesungsweg": "\\(\\log_5(x) = 3 \\Leftrightarrow x = 5^3 = 125\\)."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 5: Exponentialgleichungen mit Hilfe des Logarithmus lösen
    // ═══════════════════════════════════════════════════════════════

    {
        "id": 25, "level": 5, "typ": "numerisch",
        "frage": "Löse die Exponentialgleichung \\(2^x = 32\\).",
        "loesung": 5,
        "toleranz": 0,
        "tipp": "Schreibe \\(32\\) als Zweierpotenz oder wende \\(\\log_2\\) an.",
        "loesungsweg": "\\(2^x = 32 = 2^5 \\Rightarrow x = 5\\). Alternativ: \\(x = \\log_2(32) = 5\\)."
    },
    {
        "id": 26, "level": 5, "typ": "numerisch",
        "frage": "Löse \\(3^x = 81\\).",
        "loesung": 4,
        "toleranz": 0,
        "tipp": "Welche Potenz von \\(3\\) ergibt \\(81\\)?",
        "loesungsweg": "\\(3^4 = 81\\), also \\(x = \\log_3(81) = 4\\)."
    },
    {
        "id": 27, "level": 5, "typ": "numerisch",
        "frage": "Löse \\(10^x = 1000\\).",
        "loesung": 3,
        "toleranz": 0,
        "tipp": "Nutze \\(\\lg\\) auf beiden Seiten.",
        "loesungsweg": "\\(10^x = 1000 \\Leftrightarrow x = \\lg(1000) = 3\\), denn \\(10^3 = 1000\\)."
    },
    {
        "id": 28, "level": 5, "typ": "numerisch",
        "frage": "Löse \\(2^x = 10\\). Runde auf zwei Nachkommastellen.",
        "loesung": 3.32,
        "toleranz": 0.01,
        "tipp": "\\(x = \\log_2(10) = \\frac{\\lg(10)}{\\lg(2)} = \\frac{1}{\\lg(2)}\\).",
        "loesungsweg": "\\(x = \\log_2(10) = \\frac{\\lg(10)}{\\lg(2)} = \\frac{1}{0{,}30103} \\approx 3{,}32\\)."
    },
    {
        "id": 29, "level": 5, "typ": "mc",
        "frage": "Welcher Ausdruck löst die Gleichung \\(5^x = 20\\)?",
        "optionen": [
            "\\(x = \\frac{20}{5} = 4\\)",
            "\\(x = \\log_5(20)\\)",
            "\\(x = \\log_{20}(5)\\)",
            "\\(x = 20 - 5 = 15\\)"
        ],
        "korrekt": 1,
        "tipp": "Wende \\(\\log_5\\) auf beide Seiten an.",
        "loesungsweg": "\\(5^x = 20 \\Rightarrow x = \\log_5(20) \\approx 1{,}86\\). Numerisch über die Basiswechselformel berechenbar."
    },
    {
        "id": 30, "level": 5, "typ": "numerisch",
        "frage": "Löse \\(3 \\cdot 2^x = 48\\).",
        "loesung": 4,
        "toleranz": 0,
        "tipp": "Isoliere zuerst die Exponentialfunktion (durch \\(3\\) teilen).",
        "loesungsweg": "\\(3 \\cdot 2^x = 48 \\Leftrightarrow 2^x = 16 \\Leftrightarrow x = \\log_2(16) = 4\\)."
    },

    // ═══════════════════════════════════════════════════════════════
    // Level 6: Anwendungen — Halbwertszeit und Verdopplungszeit
    // ═══════════════════════════════════════════════════════════════

    {
        "id": 31, "level": 6, "typ": "numerisch",
        "frage": "Ein Bakterienstamm verdoppelt sich stündlich. Startwert \\(100\\). Nach wie vielen Stunden sind es \\(1600\\) Bakterien?",
        "loesung": 4,
        "toleranz": 0,
        "tipp": "Ansatz: \\(100 \\cdot 2^t = 1600\\). Löse nach \\(t\\) auf.",
        "loesungsweg": "\\(100 \\cdot 2^t = 1600 \\Leftrightarrow 2^t = 16 \\Leftrightarrow t = \\log_2(16) = 4\\) Stunden."
    },
    {
        "id": 32, "level": 6, "typ": "numerisch",
        "frage": "Ein radioaktives Material hat eine Halbwertszeit von \\(5\\) Jahren. Nach wie vielen Jahren ist nur noch \\(\\frac{1}{8}\\) der ursprünglichen Menge vorhanden?",
        "loesung": 15,
        "toleranz": 0,
        "tipp": "\\(\\frac{1}{8} = \\left(\\frac{1}{2}\\right)^3\\) — wie viele Halbwertszeiten sind das?",
        "loesungsweg": "\\(\\frac{1}{8} = \\left(\\frac{1}{2}\\right)^3\\), also sind \\(3\\) Halbwertszeiten nötig: \\(3 \\cdot 5 = 15\\) Jahre."
    },
    {
        "id": 33, "level": 6, "typ": "numerisch",
        "frage": "Ein Guthaben von \\(1000\\,€\\) wächst pro Jahr auf das \\(1{,}05\\)-fache. Nach wie vielen Jahren ist es auf \\(2000\\,€\\) angewachsen? Runde auf zwei Nachkommastellen.",
        "loesung": 14.21,
        "toleranz": 0.05,
        "tipp": "Ansatz: \\(1000 \\cdot 1{,}05^t = 2000\\), also \\(1{,}05^t = 2\\). Löse mit Logarithmus.",
        "loesungsweg": "\\(1{,}05^t = 2 \\Leftrightarrow t = \\log_{1{,}05}(2) = \\frac{\\lg(2)}{\\lg(1{,}05)} \\approx \\frac{0{,}3010}{0{,}0212} \\approx 14{,}21\\) Jahre."
    },
    {
        "id": 34, "level": 6, "typ": "mc",
        "frage": "Eine Population wächst nach \\(N(t) = 500 \\cdot 2^t\\) (in Stunden). Wann erreicht sie \\(4000\\)?",
        "optionen": ["\\(t = 2\\)", "\\(t = 3\\)", "\\(t = 4\\)", "\\(t = 8\\)"],
        "korrekt": 1,
        "tipp": "\\(500 \\cdot 2^t = 4000 \\Rightarrow 2^t = 8\\).",
        "loesungsweg": "\\(500 \\cdot 2^t = 4000 \\Leftrightarrow 2^t = 8 \\Leftrightarrow t = \\log_2(8) = 3\\) Stunden."
    },
    {
        "id": 35, "level": 6, "typ": "numerisch",
        "frage": "Ein Medikament wird im Körper pro Stunde auf \\(50\\%\\) abgebaut. Startdosis \\(200\\) mg. Nach wie vielen Stunden sind nur noch \\(25\\) mg im Körper?",
        "loesung": 3,
        "toleranz": 0,
        "tipp": "Ansatz: \\(200 \\cdot 0{,}5^t = 25\\). Bestimme zuerst den Faktor.",
        "loesungsweg": "\\(200 \\cdot 0{,}5^t = 25 \\Leftrightarrow 0{,}5^t = \\frac{1}{8} = 0{,}5^3 \\Leftrightarrow t = 3\\) Stunden."
    },
    {
        "id": 36, "level": 6, "typ": "numerisch",
        "frage": "Eine Investition wächst jährlich mit \\(8\\,\\%\\) (Faktor \\(1{,}08\\)). Wie viele Jahre dauert die Verdopplung? Runde auf zwei Nachkommastellen.",
        "loesung": 9.01,
        "toleranz": 0.05,
        "tipp": "\\(1{,}08^t = 2\\), also \\(t = \\log_{1{,}08}(2) = \\frac{\\lg(2)}{\\lg(1{,}08)}\\).",
        "loesungsweg": "\\(1{,}08^t = 2 \\Leftrightarrow t = \\frac{\\lg(2)}{\\lg(1{,}08)} \\approx \\frac{0{,}3010}{0{,}0334} \\approx 9{,}01\\) Jahre."
    }

    ];
    </script>
    <script src="../spirale-engine.js"></script>
</body>
</html>
