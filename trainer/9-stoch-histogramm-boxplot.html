      {

        frage: "Welche Klassenmitte hat die Klasse \\([15;\\ 25)\\)?",

        tipp: "Mittelwert der beiden Klassengrenzen.",
        loesungsweg: "Klassenmitte \\(= \\frac{15 + 25}{2} = 20\\)."

      {

        frage: "Ein Histogramm zeigt folgende absolute Häufigkeiten: Klasse \\([0;\\ 10)\\): 5, Klasse \\([10;\\ 20)\\): 8, Klasse \\([20;\\ 30)\\): 12, Klasse \\([30;\\ 40)\\): 5. Wie viele Datenwerte liegen insgesamt vor?",
