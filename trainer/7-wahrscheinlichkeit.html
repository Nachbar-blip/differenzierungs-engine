<body>
    <div class="spirale-container" id="app"></div>
    <script>

            tipp: "\\(h(\\text{Kopf}) = \\frac{245}{500}\\).",
            loesungsweg: "\\(h(\\text{Kopf}) = \\frac{245}{500} = 0{,}49\\)."

            loesungsweg: "\\(P(\\text{nicht rot}) = 1 - \\frac{3}{8} = \\frac{5}{8} = 0{,}625\\)."
        },
        {
            id: 23, level: 4, typ: "mc",
            frage: "Du würfelst einmal. \\(P(\\text{Augenzahl} \\leq 4) = \\frac{4}{6}\\). Wie groß ist \\(P(\\text{Augenzahl} > 4)\\)?",

        // ===== Level 5: Baumdiagramme (2-stufig), Pfadregeln =====
        {
            id: 25, level: 5, typ: "numerisch",
            frage: "Eine Münze wird zweimal geworfen. Wie groß ist \\(P(\\text{2× Kopf})\\)? Gib das Ergebnis als Dezimalzahl ein.",

            tipp: "Produktregel (UND): Die Wahrscheinlichkeiten entlang eines Pfades werden multipliziert.",

        {

            frage: "Münze zweimal werfen: Welche Pfadregel verwendet man, um \\(P(\\text{Kopf und dann Zahl})\\) zu berechnen?",

            tipp: "Entlang eines Pfades im Baumdiagramm gilt: UND = multiplizieren.",

        },
        {
            id: 28, level: 5, typ: "mc",
            frage: "Ein Würfel wird zweimal geworfen. Wie groß ist \\(P(\\text{zweimal eine 6})\\)?",
            optionen: ["\\(\\frac{1}{6}\\)", "\\(\\frac{1}{12}\\)", "\\(\\frac{1}{36}\\)", "\\(\\frac{2}{6}\\)"],

            tipp: "Produktregel: \\(P = \\frac{1}{6} \\cdot \\frac{1}{6}\\).",
            loesungsweg: "\\(P(\\text{6 und 6}) = \\frac{1}{6} \\cdot \\frac{1}{6} = \\frac{1}{36}\\)."
        },
        {
            id: 29, level: 5, typ: "numerisch",

            frage: "Eine Ampel ist mit Wahrscheinlichkeit \\(0{,}4\\) grün. Du fährst an zwei unabhängigen Ampeln vorbei. Wie groß ist \\(P(\\text{beide grün})\\)?",

            tipp: "Produktregel: \\(P = 0{,}4 \\cdot 0{,}4\\).",
            loesungsweg: "\\(P(\\text{beide grün}) = 0{,}4 \\cdot 0{,}4 = 0{,}16\\)."

        {

        },
        {
            id: 33, level: 6, typ: "mc",
            frage: "Ein Spiel: Zwei Spieler würfeln je einmal. Spieler A gewinnt bei Augensumme \\(> 7\\), Spieler B bei Augensumme \\(\\leq 7\\). Ist das Spiel fair?",

            tipp: "Zähle die Paare \\((a,b)\\) mit \\(a + b > 7\\) und mit \\(a + b \\leq 7\\). Insgesamt gibt es \\(36\\) Paare.",

        },
        {

            frage: "In einer Schachtel sind \\(12\\) Lose, davon \\(3\\) Gewinne. Du ziehst \\(2\\) Lose ohne Zurücklegen. Wie groß ist \\(P(\\text{kein Gewinn})\\)? Runde auf zwei Nachkommastellen.",
