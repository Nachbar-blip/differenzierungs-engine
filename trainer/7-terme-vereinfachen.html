<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>Terme vereinfachen - DifferenzierungsEngine</title>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="../spirale.css">

</head>
<body>
    <div class="spirale-container" id="app"></div>
    <script>
    const THEMA_KEY = '7-terme-vereinfachen';
    const THEMA_CONFIG = { name: 'Terme vereinfachen', bereich: 'algebra', p3Enabled: true };
    const AUFGABEN = [
      // ========== LEVEL 1 — babyleicht: Gleichartige Terme zusammenfassen ==========
      {
        id: 1,
        level: 1,
        typ: "mc",
        frage: "Welcher Term ist zu \\(5x + 3x\\) gleichwertig?",
        optionen: ["\\(15x\\)", "\\(8x\\)", "\\(8x^2\\)", "\\(2x\\)"],
        korrekt: 1,
        tipp: "Addiere die Koeffizienten vor \\(x\\): Wie viel ist \\(5 + 3\\)?",
        loesungsweg: "$$5x + 3x = (5+3) \\cdot x = 8x$$"
      },
      {
        id: 2,
        level: 1,
        typ: "numerisch",
        frage: "Fasse zusammen: \\(7a - 2a\\). Wie lautet der Koeffizient des Ergebnisses?",
        loesung: 5,
        toleranz: 0,
        tipp: "Subtrahiere die Koeffizienten: \\(7 - 2 = \\,?\\)",
        loesungsweg: "$$7a - 2a = (7-2) \\cdot a = 5a \\quad \\Rightarrow \\text{Koeffizient} = 5$$"
      },
      {
        id: 3,
        level: 1,
        typ: "mc",
        frage: "Vereinfache \\(4y + y\\).",
        optionen: ["\\(4y\\)", "\\(5y\\)", "\\(4y^2\\)", "\\(5y^2\\)"],
        korrekt: 1,
        tipp: "Denke daran: \\(y = 1 \\cdot y\\). Also \\(4y + 1y = \\,?\\)",
        loesungsweg: "$$4y + y = 4y + 1y = (4+1) \\cdot y = 5y$$"
      },
      {
        id: 4,
        level: 1,
        typ: "numerisch",
        frage: "Vereinfache \\(9x - 3x + x\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 7,
        toleranz: 0,
        tipp: "Rechne Schritt für Schritt: \\(9 - 3 + 1 = \\,?\\)",
        loesungsweg: "$$9x - 3x + x = (9 - 3 + 1) \\cdot x = 7x$$"
      },
      {
        id: 5,
        level: 1,
        typ: "mc",
        frage: "Welcher Term ist zu \\(10b - 10b\\) gleichwertig?",
        optionen: ["\\(20b\\)", "\\(0\\)", "\\(b\\)", "\\(100b\\)"],
        korrekt: 1,
        tipp: "Was passiert, wenn man denselben Term subtrahiert?",
        loesungsweg: "$$10b - 10b = (10 - 10) \\cdot b = 0 \\cdot b = 0$$"
      },
      {
        id: 6,
        level: 1,
        typ: "numerisch",
        frage: "Vereinfache \\(3x + 8x - 6x\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 5,
        toleranz: 0,
        tipp: "Addiere und subtrahiere die Koeffizienten: \\(3 + 8 - 6 = \\,?\\)",
        loesungsweg: "$$3x + 8x - 6x = (3 + 8 - 6) \\cdot x = 5x$$"
      },
      // ========== LEVEL 2 — leicht: Terme mit zwei Variablen zusammenfassen ==========
      {
        id: 7,
        level: 2,
        typ: "mc",
        frage: "Vereinfache \\(3a + 2b + 5a - b\\).",
        optionen: ["\\(8a + 3b\\)", "\\(8a + b\\)", "\\(9ab\\)", "\\(8a - b\\)"],
        korrekt: 1,
        tipp: "Sammle erst alle \\(a\\)-Terme, dann alle \\(b\\)-Terme: \\(3a + 5a\\) und \\(2b - b\\).",
        loesungsweg: "$$3a + 2b + 5a - b = (3a + 5a) + (2b - b) = 8a + b$$"
      },
      {
        id: 8,
        level: 2,
        typ: "numerisch",
        frage: "Vereinfache \\(6x + 3y - 2x + y\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 4,
        toleranz: 0,
        tipp: "Fasse die \\(x\\)-Terme zusammen: \\(6x - 2x = \\,?\\)",
        loesungsweg: "$$6x + 3y - 2x + y = (6-2)x + (3+1)y = 4x + 4y \\quad \\Rightarrow \\text{Koeffizient vor } x = 4$$"
      },
      {
        id: 9,
        level: 2,
        typ: "mc",
        frage: "Welche Terme sind gleichartig?",
        optionen: ["\\(3x\\) und \\(3y\\)", "\\(5a\\) und \\(-2a\\)", "\\(4x\\) und \\(4x^2\\)", "\\(2ab\\) und \\(2a\\)"],
        korrekt: 1,
        tipp: "Gleichartige Terme haben exakt dieselbe Variable mit demselben Exponenten.",
        loesungsweg: "\\(5a\\) und \\(-2a\\) sind gleichartig, weil beide den Faktor \\(a\\) (mit Exponent 1) enthalten. Die anderen Paare unterscheiden sich in der Variable oder im Exponenten."
      },
      {
        id: 10,
        level: 2,
        typ: "mc",
        frage: "Vereinfache \\(7m - 3n + 2m + 5n - m\\).",
        optionen: ["\\(8m + 2n\\)", "\\(10mn\\)", "\\(8m - 2n\\)", "\\(6m + 2n\\)"],
        korrekt: 0,
        tipp: "\\(m\\)-Terme: \\(7m + 2m - m\\). \\(n\\)-Terme: \\(-3n + 5n\\).",
        loesungsweg: "$$7m - 3n + 2m + 5n - m = (7+2-1)m + (-3+5)n = 8m + 2n$$"
      },
      {
        id: 11,
        level: 2,
        typ: "numerisch",
        frage: "Vereinfache \\(4a + 3b - 2a - 5b\\). Wie lautet der Koeffizient vor \\(b\\)?",
        loesung: -2,
        toleranz: 0,
        tipp: "Fasse die \\(b\\)-Terme zusammen: \\(3b - 5b = \\,?\\)",
        loesungsweg: "$$4a + 3b - 2a - 5b = (4-2)a + (3-5)b = 2a - 2b \\quad \\Rightarrow \\text{Koeffizient vor } b = -2$$"
      },
      {
        id: 12,
        level: 2,
        typ: "numerisch",
        frage: "Im Term \\(5x^2 + 3x - 2x^2 + x\\): Wie lautet der Koeffizient vor \\(x^2\\) nach dem Vereinfachen?",
        loesung: 3,
        toleranz: 0,
        tipp: "Fasse die \\(x^2\\)-Terme zusammen: \\(5x^2 - 2x^2 = \\,?\\)",
        loesungsweg: "$$5x^2 + 3x - 2x^2 + x = (5-2)x^2 + (3+1)x = 3x^2 + 4x \\quad \\Rightarrow \\text{Koeffizient vor } x^2 = 3$$"
      },
      // ========== LEVEL 3 — nervenschonend: Ausmultiplizieren einfacher Klammern ==========
      {
        id: 13,
        level: 3,
        typ: "mc",
        frage: "Multipliziere aus: \\(3(x + 2)\\).",
        optionen: ["\\(3x + 2\\)", "\\(3x + 6\\)", "\\(3x + 5\\)", "\\(6x\\)"],
        korrekt: 1,
        tipp: "Multipliziere \\(3\\) mit jedem Summanden in der Klammer: \\(3 \\cdot x\\) und \\(3 \\cdot 2\\).",
        loesungsweg: "$$3(x + 2) = 3 \\cdot x + 3 \\cdot 2 = 3x + 6$$"
      },
      {
        id: 14,
        level: 3,
        typ: "mc",
        frage: "Multipliziere aus: \\(-2(a - 5)\\).",
        optionen: ["\\(-2a - 5\\)", "\\(-2a + 10\\)", "\\(-2a - 10\\)", "\\(2a - 10\\)"],
        korrekt: 1,
        tipp: "Achtung beim Minuszeichen! \\(-2 \\cdot (-5) = \\,?\\)",
        loesungsweg: "$$-2(a - 5) = -2 \\cdot a + (-2) \\cdot (-5) = -2a + 10$$"
      },
      {
        id: 15,
        level: 3,
        typ: "numerisch",
        frage: "Multipliziere aus: \\(4(2x + 3)\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 8,
        toleranz: 0,
        tipp: "\\(4 \\cdot 2x = \\,?\\)",
        loesungsweg: "$$4(2x + 3) = 4 \\cdot 2x + 4 \\cdot 3 = 8x + 12 \\quad \\Rightarrow \\text{Koeffizient vor } x = 8$$"
      },
      {
        id: 16,
        level: 3,
        typ: "numerisch",
        frage: "Vereinfache \\(5(x + 1) + 3\\). Wie lautet das absolute Glied (die Zahl ohne Variable)?",
        loesung: 8,
        toleranz: 0,
        tipp: "Erst ausmultiplizieren: \\(5x + 5\\), dann \\(+ 3\\) addieren.",
        loesungsweg: "$$5(x + 1) + 3 = 5x + 5 + 3 = 5x + 8 \\quad \\Rightarrow \\text{absolutes Glied} = 8$$"
      },
      {
        id: 17,
        level: 3,
        typ: "mc",
        frage: "Vereinfache \\(-3(2y - 4)\\).",
        optionen: ["\\(-6y + 12\\)", "\\(-6y - 12\\)", "\\(6y + 12\\)", "\\(-6y - 4\\)"],
        korrekt: 0,
        tipp: "\\(-3 \\cdot 2y = -6y\\) und \\(-3 \\cdot (-4) = \\,?\\)",
        loesungsweg: "$$-3(2y - 4) = -3 \\cdot 2y + (-3) \\cdot (-4) = -6y + 12$$"
      },
      {
        id: 18,
        level: 3,
        typ: "mc",
        frage: "Vereinfache \\(2(3a + 1) + 4a\\).",
        optionen: ["\\(6a + 1\\)", "\\(10a\\)", "\\(10a + 2\\)", "\\(6a + 5\\)"],
        korrekt: 2,
        tipp: "Erst ausmultiplizieren: \\(6a + 2\\), dann \\(+ 4a\\) zusammenfassen.",
        loesungsweg: "$$2(3a + 1) + 4a = 6a + 2 + 4a = 10a + 2$$"
      },
      // ========== LEVEL 4 — mittel: Terme mit mehreren Klammern ==========
      {
        id: 19,
        level: 4,
        typ: "mc",
        frage: "Vereinfache \\(3(x + 1) + 2(x - 4)\\).",
        optionen: ["\\(5x + 3\\)", "\\(5x - 5\\)", "\\(5x + 7\\)", "\\(5x - 3\\)"],
        korrekt: 1,
        tipp: "Multipliziere jede Klammer einzeln aus und fasse dann zusammen.",
        loesungsweg: "$$3(x + 1) + 2(x - 4) = 3x + 3 + 2x - 8 = 5x - 5$$"
      },
      {
        id: 20,
        level: 4,
        typ: "numerisch",
        frage: "Vereinfache \\(5(a - 2) - 3(a + 1)\\). Wie lautet der Koeffizient vor \\(a\\)?",
        loesung: 2,
        toleranz: 0,
        tipp: "Ausmultiplizieren: \\(5a - 10 - 3a - 3\\). Dann \\(a\\)-Terme zusammenfassen.",
        loesungsweg: "$$5(a - 2) - 3(a + 1) = 5a - 10 - 3a - 3 = 2a - 13 \\quad \\Rightarrow \\text{Koeffizient vor } a = 2$$"
      },
      {
        id: 21,
        level: 4,
        typ: "mc",
        frage: "Vereinfache \\(4(2x - 3) - (x + 5)\\).",
        optionen: ["\\(7x - 17\\)", "\\(9x - 8\\)", "\\(7x - 7\\)", "\\(7x + 2\\)"],
        korrekt: 0,
        tipp: "Das Minus vor der zweiten Klammer wirkt wie \\(-1 \\cdot (x + 5)\\).",
        loesungsweg: "$$4(2x - 3) - (x + 5) = 8x - 12 - x - 5 = 7x - 17$$"
      },
      {
        id: 22,
        level: 4,
        typ: "numerisch",
        frage: "Vereinfache \\(-(3y - 7) + 2(y + 4)\\). Wie lautet das absolute Glied?",
        loesung: 15,
        toleranz: 0,
        tipp: "\\(-(3y - 7) = -3y + 7\\). Dann \\(2(y + 4) = 2y + 8\\). Zahlen addieren.",
        loesungsweg: "$$-(3y - 7) + 2(y + 4) = -3y + 7 + 2y + 8 = -y + 15 \\quad \\Rightarrow \\text{absolutes Glied} = 15$$"
      },
      {
        id: 23,
        level: 4,
        typ: "mc",
        frage: "Vereinfache \\(6(x - 1) - 2(3x + 2)\\).",
        optionen: ["\\(12x - 10\\)", "\\(-10\\)", "\\(0x - 10\\)", "\\(-2\\)"],
        korrekt: 1,
        tipp: "\\(6x - 6 - 6x - 4\\). Was passiert mit den \\(x\\)-Termen?",
        loesungsweg: "$$6(x - 1) - 2(3x + 2) = 6x - 6 - 6x - 4 = 0x - 10 = -10$$"
      },
      {
        id: 24,
        level: 4,
        typ: "numerisch",
        frage: "Vereinfache \\(3(2a + b) - 2(a - 3b)\\). Wie lautet der Koeffizient vor \\(b\\)?",
        loesung: 9,
        toleranz: 0,
        tipp: "\\(3 \\cdot b = 3b\\) und \\(-2 \\cdot (-3b) = 6b\\). Zusammen?",
        loesungsweg: "$$3(2a + b) - 2(a - 3b) = 6a + 3b - 2a + 6b = 4a + 9b \\quad \\Rightarrow \\text{Koeffizient vor } b = 9$$"
      },
      // ========== LEVEL 5 — anspruchsvoll: Termwerte berechnen und Ausklammern ==========
      {
        id: 25,
        level: 5,
        typ: "numerisch",
        frage: "Berechne den Termwert von \\(3x^2 - 2x + 1\\) für \\(x = -2\\).",
        loesung: 17,
        toleranz: 0,
        tipp: "Einsetzen: \\(3 \\cdot (-2)^2 - 2 \\cdot (-2) + 1\\). Beachte: \\((-2)^2 = 4\\).",
        loesungsweg: "$$3 \\cdot (-2)^2 - 2 \\cdot (-2) + 1 = 3 \\cdot 4 + 4 + 1 = 12 + 4 + 1 = 17$$"
      },
      {
        id: 26,
        level: 5,
        typ: "mc",
        frage: "Klammere den gemeinsamen Faktor aus: \\(6x + 9\\).",
        optionen: ["\\(3(2x + 3)\\)", "\\(6(x + 3)\\)", "\\(3(2x + 9)\\)", "\\(9(x + 1)\\)"],
        korrekt: 0,
        tipp: "Was ist der GGT von 6 und 9?",
        loesungsweg: "$$\\text{GGT}(6, 9) = 3 \\quad \\Rightarrow \\quad 6x + 9 = 3(2x + 3)$$"
      },
      {
        id: 27,
        level: 5,
        typ: "numerisch",
        frage: "Berechne den Termwert von \\(a^2 - 4a + 3\\) für \\(a = 5\\).",
        loesung: 8,
        toleranz: 0,
        tipp: "\\(5^2 - 4 \\cdot 5 + 3 = 25 - 20 + 3\\).",
        loesungsweg: "$$5^2 - 4 \\cdot 5 + 3 = 25 - 20 + 3 = 8$$"
      },
      {
        id: 28,
        level: 5,
        typ: "mc",
        frage: "Klammere aus: \\(4x^2 - 8x\\).",
        optionen: ["\\(4(x^2 - 8x)\\)", "\\(4x(x - 2)\\)", "\\(2x(2x - 4)\\)", "\\(8x(x - 1)\\)"],
        korrekt: 1,
        tipp: "Der GGT von \\(4x^2\\) und \\(8x\\) ist \\(4x\\).",
        loesungsweg: "$$4x^2 - 8x = 4x \\cdot x - 4x \\cdot 2 = 4x(x - 2)$$"
      },
      {
        id: 29,
        level: 5,
        typ: "numerisch",
        frage: "Berechne \\(2(x+1)^2 - 3x\\) für \\(x = 3\\).",
        loesung: 23,
        toleranz: 0,
        tipp: "Erst \\((3+1)^2 = 16\\), dann \\(2 \\cdot 16 - 3 \\cdot 3\\).",
        loesungsweg: "$$2(3+1)^2 - 3 \\cdot 3 = 2 \\cdot 16 - 9 = 32 - 9 = 23$$"
      },
      {
        id: 30,
        level: 5,
        typ: "mc",
        frage: "Klammere aus: \\(12a^2b + 18ab^2\\).",
        optionen: ["\\(6ab(2a + 3b)\\)", "\\(6a(2ab + 3b^2)\\)", "\\(12ab(a + b)\\)", "\\(3ab(4a + 6b)\\)"],
        korrekt: 0,
        tipp: "\\(\\text{GGT}(12, 18) = 6\\). Beide Terme enthalten \\(a\\) und \\(b\\).",
        loesungsweg: "$$12a^2b + 18ab^2 = 6ab \\cdot 2a + 6ab \\cdot 3b = 6ab(2a + 3b)$$"
      },
      // ========== LEVEL 6 — wagnerisch: Komplexe Termumformungen ==========
      {
        id: 31,
        level: 6,
        typ: "mc",
        frage: "Multipliziere aus: \\((x + 3)(x - 1)\\).",
        optionen: ["\\(x^2 + 2x - 3\\)", "\\(x^2 - 4x + 3\\)", "\\(x^2 + 4x - 3\\)", "\\(x^2 - 2x - 3\\)"],
        korrekt: 0,
        tipp: "Verwende die FOIL-Methode: Erste, Äußere, Innere, Letzte.",
        loesungsweg: "$$\\begin{aligned}(x + 3)(x - 1) &= x \\cdot x + x \\cdot (-1) + 3 \\cdot x + 3 \\cdot (-1) \\\\ &= x^2 - x + 3x - 3 = x^2 + 2x - 3\\end{aligned}$$"
      },
      {
        id: 32,
        level: 6,
        typ: "numerisch",
        frage: "Die Fläche eines Rechtecks hat die Seiten \\((x + 3)\\) und \\((x - 1)\\). Berechne die Fläche für \\(x = 5\\).",
        loesung: 32,
        toleranz: 0,
        tipp: "Setze \\(x = 5\\) ein: Seiten sind \\(8\\) und \\(4\\).",
        loesungsweg: "$$A = (5 + 3)(5 - 1) = 8 \\cdot 4 = 32$$"
      },
      {
        id: 33,
        level: 6,
        typ: "mc",
        frage: "Multipliziere aus: \\((a + b)(a - b)\\).",
        optionen: ["\\(a^2 + b^2\\)", "\\(a^2 - b^2\\)", "\\(a^2 - 2ab + b^2\\)", "\\(a^2 + 2ab - b^2\\)"],
        korrekt: 1,
        tipp: "Das ist die 3. binomische Formel! Die mittleren Terme heben sich auf.",
        loesungsweg: "$$\\begin{aligned}(a + b)(a - b) &= a^2 - ab + ab - b^2 = a^2 - b^2\\end{aligned}$$"
      },
      {
        id: 34,
        level: 6,
        typ: "numerisch",
        frage: "Vereinfache \\((2x + 1)(x - 3) + (x + 2)(x + 3)\\) und gib den Koeffizienten vor \\(x^2\\) an.",
        loesung: 3,
        toleranz: 0,
        tipp: "Multipliziere beide Produkte einzeln aus und fasse die \\(x^2\\)-Terme zusammen.",
        loesungsweg: "$$\\begin{aligned}(2x+1)(x-3) &= 2x^2 - 6x + x - 3 = 2x^2 - 5x - 3 \\\\ (x+2)(x+3) &= x^2 + 3x + 2x + 6 = x^2 + 5x + 6 \\\\ \\text{Summe} &= 3x^2 + 0x + 3 \\end{aligned}$$ Koeffizient vor \\(x^2 = 3\\)."
      },
      {
        id: 35,
        level: 6,
        typ: "mc",
        frage: "Ein quadratisches Grundstück mit Seitenlänge \\(a\\) wird um \\(2\\,\\text{m}\\) verlängert und um \\(2\\,\\text{m}\\) verkürzt. Welcher Term beschreibt die neue Fläche?",
        optionen: ["\\(a^2 - 4\\)", "\\(a^2 + 4\\)", "\\(a^2\\)", "\\((a-2)^2\\)"],
        korrekt: 0,
        tipp: "Die neuen Seiten sind \\((a + 2)\\) und \\((a - 2)\\). Welche binomische Formel passt?",
        loesungsweg: "$$A = (a + 2)(a - 2) = a^2 - 4 \\quad \\text{(3. binomische Formel)}$$"
      },
      {
        id: 36,
        level: 6,
        typ: "numerisch",
        frage: "Vereinfache \\(3(x+2)^2 - 3x^2\\). Wie lautet der Koeffizient vor \\(x\\)?",
        loesung: 12,
        toleranz: 0,
        tipp: "Löse zuerst \\((x+2)^2 = x^2 + 4x + 4\\) auf, dann multipliziere mit 3.",
        loesungsweg: "$$\\begin{aligned}3(x+2)^2 - 3x^2 &= 3(x^2 + 4x + 4) - 3x^2 \\\\ &= 3x^2 + 12x + 12 - 3x^2 = 12x + 12\\end{aligned}$$ Koeffizient vor \\(x = 12\\)."
      }
    ];
    </script>
