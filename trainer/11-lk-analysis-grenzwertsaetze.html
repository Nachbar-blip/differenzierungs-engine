    // ═══════════════════════════════════════════════════════════════

        loesungsweg: "\\(\\frac{(\\sqrt{1+x}-\\sqrt{1-x})(\\sqrt{1+x}+\\sqrt{1-x})}{x(\\sqrt{1+x}+\\sqrt{1-x})} = \\frac{2x}{x(\\sqrt{1+x}+\\sqrt{1-x})} = \\frac{2}{\\sqrt{1+x}+\\sqrt{1-x}}\\). Einsetzen: \\(\\frac{2}{1+1} = 1\\)."

        tipp: "Erweitere mit \\(\\sqrt{x^2+4x}+x\\). Im Zähler entsteht \\(x^2+4x - x^2 = 4x\\).",

    // ═══════════════════════════════════════════════════════════════

    {

        frage: \"Berechne \\(\\lim_{x \\to 0} \\frac{(1+x)^3 - 1}{x}\\). Tipp: Expandiere den Zähler.\",

    },
